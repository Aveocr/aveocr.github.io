<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поздравления — 23 февраля и 8 марта</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 60px;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: #94a3b8;
      text-align: center;
      max-width: 600px;
      line-height: 1.4;
    }

    .holidays {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
    }

    .holiday-card {
      background: rgba(30, 41, 59, 0.7);
      border-radius: 20px;
      padding: 40px 50px;
      width: 100%;
      max-width: 480px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      transition: all 0.35s ease;
      text-align: center;
    }

    .holiday-card:hover {
      transform: translateY(-12px);
      border-color: #818cf8;
      box-shadow: 0 25px 50px -12px rgba(129, 140, 248, 0.4);
    }

    .holiday-card h2 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin-bottom: 30px;
    }

    .feb23 { color: #60a5fa; }
    .mar8  { color: #f472b6; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .link-btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 1.15rem;
      font-weight: 500;
      color: white;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s ease;
      min-width: 220px;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
    }

    .link-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.5);
    }

    .main-version {
      background: linear-gradient(90deg, #ec4899, #f472b6, #fb7185) !important;
      box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4) !important;
      font-weight: 600;
      position: relative;
    }

    .main-version::after {
      content: "★ основная версия ★";
      position: absolute;
      top: -10px;
      right: -30px;
      background: #fbbf24;
      color: #1e293b;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      transform: rotate(12deg);
      font-weight: bold;
    }

    footer {
      margin-top: 80px;
      color: #64748b;
      font-size: 0.95rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .holidays {
        flex-direction: column;
        align-items: center;
      }
      .holiday-card {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

  <h1>Поздравления</h1>
  <p class="subtitle">Выберите праздник и удивите близких небольшой интерактивной открыткой</p>

  <div class="holidays">

    <!-- 23 февраля -->
    <div class="holiday-card">
      <h2 class="feb23">23 февраля</h2>
      <div class="links">
        <a href="23februare.html" class="link-btn">Открыть поздравление →</a>
      </div>
    </div>

    <!-- 8 марта -->
    <div class="holiday-card">
      <h2 class="mar8">8 марта</h2>
      <div class="links">
        <a href="mahjong.html" class="link-btn">Mahjong «Весенние тайны»</a>
        <a href="memory.html" class="link-btn main-version">Memory «Цветочный сад тайн»</a>
        <a href="puzzle.html" class="link-btn">Слайдинг-пазл</a>
      </div>
    </div>

  </div>

  <footer>
    С любовью к прекрасному полу · 2025–2026
  </footer>

</body>
</html>
