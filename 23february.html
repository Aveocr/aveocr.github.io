<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>23 ФЕВРАЛЯ — Защитник Отечества</title>
<style>

</style>
</head>
<body>

<div id="legend">
  <h3>📋 ЦЕЛИ</h3>
  <div class="legend-item" onclick="showImage('./img/НЖЯ.png', 'Нежелательное явление')">
    <img class="legend-img" src="./img/НЖЯ.png" alt="НЖЯ" onerror="this.style.display='none'">
    <div class="legend-text">
      <span class="legend-name">Нежелательное явление</span>
      <span class="legend-points">★ 30 очков</span>
    </div>
  </div>
  <div class="legend-item" onclick="showImage('./img/mid.png', 'Мошенник')">
    <img class="legend-img" src="./img/mid.png" alt="Мошенник" onerror="this.style.display='none'">
    <div class="legend-text">
      <span class="legend-name">Мошенник</span>
      <span class="legend-points">★ 20 очков</span>
    </div>
  </div>
  <div class="legend-item" onclick="showImage('./img/huge.png', 'Риск')">
    <img class="legend-img" src="./img/huge.png" alt="Риск" onerror="this.style.display='none'">
    <div class="legend-text">
      <span class="legend-name">Риск</span>
      <span class="legend-points">★ 10 очков</span>
    </div>
  </div>
  <div style="margin-top:15px;padding-top:15px;border-top:2px solid #b71c1c;font-size:0.85em;color:#aaa;text-align:center;">
    Промахов: <span style="color:#ffca28;">3</span> = Конец игры
  </div>
</div>

<!-- Модальное окно для увеличенного изображения -->
<div id="imageModal" onclick="closeImageModal()">
  <div id="imageModalContent" onclick="event.stopPropagation()">
    <img id="modalImage" src="" alt="">
    <div id="modalCaption"></div>
    <button onclick="closeImageModal()">Закрыть</button>
  </div>
</div>

<div id="game-container">
  <div id="ui">
    ОЧКИ: <span id="score">0</span>
    ПРОМАХИ: <span id="misses">0</span>/3
    УРОВЕНЬ: <span id="level">1</span>
    <br>
    <button id="startBtn">К БОЮ!</button>
  </div>

  <canvas id="game" width="600" height="800"></canvas>
</div>

<div id="modal">
  <div id="modalContent">
    <div id="congrats"></div>
    <button id="closeModal">Ещё раз в бой!</button>
  </div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d",{alpha:false});

const scoreEl=document.getElementById("score");
const missesEl=document.getElementById("misses");
const levelEl=document.getElementById("level");
const startBtn=document.getElementById("startBtn");
const modal=document.getElementById("modal");
const congrats=document.getElementById("congrats");
const closeModal=document.getElementById("closeModal");

let score=0,misses=0,level=1;
let gameOver=true;
let fallingItems=[];
let explosions=[];
let mouseX=300,mouseY=400;
let lastSpawnTime=0;
let spawnInterval=2500;
let baseSpeed=2;

const PLAYER_ZONE_HEIGHT=100;
const BANK_WIDTH=140*1.4;
const BANK_HEIGHT=90*1.4;

const bankImg=new Image();
bankImg.src="./img/bank.svg";

const smallImg=new Image();
smallImg.src="./img/НЖЯ.png";

const mediumImg=new Image();
mediumImg.src="./img/mid.png";

const largeImg=new Image();
largeImg.src="./img/huge.png";

const shotgun=new Image();
shotgun.src="./img/shotgun.svg";

const crosshair=new Image();
crosshair.src="./img/cross_hair.svg";

const bank={
  x:canvas.width-BANK_WIDTH,
  y:canvas.height-PLAYER_ZONE_HEIGHT-BANK_HEIGHT+20
};

const player={
  x:canvas.width/2,
  y:canvas.height-PLAYER_ZONE_HEIGHT/2,
  width:140,
  height:60
};

const types=[
  ...Array(3).fill("small"),
  ...Array(2).fill("medium"),
  ...Array(5).fill("large")
];

function showImage(src, caption){
  const modal = document.getElementById('imageModal');
  const img = document.getElementById('modalImage');
  const cap = document.getElementById('modalCaption');
  
  img.src = src;
  cap.textContent = caption;
  modal.style.display = 'flex';
}

function closeImageModal(){
  document.getElementById('imageModal').style.display = 'none';
}

// Закрытие по Escape
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    closeImageModal();
  }
});

function spawnItem(){
  if(fallingItems.length>=5)return;

  const randomType=types[Math.floor(Math.random()*types.length)];
  let size,points;

  if(randomType==="small"){size=80;points=30;}
  else if(randomType==="medium"){size=90;points=20;}
  else{size=120;points=10;}

  fallingItems.push({
    x:size/2+Math.random()*(canvas.width-size),
    y:-size,
    size,
    type:randomType,
    points,
    speed:baseSpeed+Math.random()*1.5
  });

  lastSpawnTime=performance.now();
}

function updateLevel(){
  const newLevel = Math.floor(score / 50) + 1;

  if(newLevel !== level){
    level = newLevel;
    levelEl.textContent = level;

    baseSpeed = 2 + (level - 1) * 0.8;
    spawnInterval = Math.max(800, 2500 - (level - 1) * 300);

    fallingItems.forEach(item=>{
      item.speed = baseSpeed + Math.random()*1.5;
    });
  }
}

function createExplosion(x,y){
  explosions.push({
    x,y,
    radius:10,
    alpha:1,
    sparks:Array.from({length:14},()=>({
      angle:Math.random()*Math.PI*2,
      speed:2+Math.random()*3,
      dist:0
    }))
  });
}

function update(){
  if(gameOver)return;

  const now=performance.now();
  if(now-lastSpawnTime>spawnInterval)spawnItem();

  for(let i=fallingItems.length-1;i>=0;i--){
    const it=fallingItems[i];
    it.y+=it.speed;

    if(it.y>canvas.height-PLAYER_ZONE_HEIGHT){
      misses++;
      missesEl.textContent=misses;
      fallingItems.splice(i,1);
      if(misses>=3)endGame();
    }
  }

  for(let i=explosions.length-1;i>=0;i--){
    const e=explosions[i];
    e.radius+=4;
    e.alpha-=0.05;
    e.sparks.forEach(s=>s.dist+=s.speed);
    if(e.alpha<=0)explosions.splice(i,1);
  }
}

function draw(){
  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#eee";
  ctx.fillRect(0,canvas.height-PLAYER_ZONE_HEIGHT,canvas.width,PLAYER_ZONE_HEIGHT);

  if(bankImg.complete)
    ctx.drawImage(bankImg,bank.x,bank.y,BANK_WIDTH,BANK_HEIGHT);

  for(const item of fallingItems){
    const h=item.size/2;

    if(item.type==="small"&&smallImg.complete)
      ctx.drawImage(smallImg,item.x-h,item.y-h,item.size,item.size);
    else if(item.type==="medium"&&mediumImg.complete)
      ctx.drawImage(mediumImg,item.x-h,item.y-h,item.size,item.size);
    else if(item.type==="large"&&largeImg.complete)
      ctx.drawImage(largeImg,item.x-h,item.y-h,item.size,item.size);
    else{
      ctx.fillStyle="#999";
      ctx.fillRect(item.x-h,item.y-h,item.size,item.size);
    }

    if(item.type==="small"){
      ctx.fillStyle="#000";
      ctx.font=`bold ${item.size*0.32}px Arial Black`;
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText("НЖЯ",item.x,item.y);
    }
  }

  explosions.forEach(e=>{
    ctx.globalAlpha=e.alpha;
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
    ctx.fillStyle="orange";
    ctx.fill();

    e.sparks.forEach(s=>{
      const sx=e.x+Math.cos(s.angle)*s.dist;
      const sy=e.y+Math.sin(s.angle)*s.dist;
      ctx.fillStyle="yellow";
      ctx.fillRect(sx,sy,4,4);
    });

    ctx.globalAlpha=1;
  });

  if(shotgun.complete)
    ctx.drawImage(shotgun,player.x-player.width/2,player.y-player.height/2,player.width,player.height);

  if(crosshair.complete)
    ctx.drawImage(crosshair,mouseX-25,mouseY-25,50,50);
}

canvas.addEventListener("click",()=>{
  if(gameOver)return;

  for(let i=fallingItems.length-1;i>=0;i--){
    const it=fallingItems[i];
    if(mouseX>=it.x-it.size/2 &&
       mouseX<=it.x+it.size/2 &&
       mouseY>=it.y-it.size/2 &&
       mouseY<=it.y+it.size/2){

      score+=it.points;
      scoreEl.textContent=score;

      updateLevel();
      createExplosion(it.x,it.y);
      fallingItems.splice(i,1);
      spawnItem();
      break;
    }
  }
});

canvas.addEventListener("mousemove",e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left;
  mouseY=e.clientY-r.top;
  player.x=Math.max(player.width/2,
    Math.min(canvas.width-player.width/2,mouseX));
});

// Функция формирования поздравления
function getCongratsMessage(score, level){
    let title, subtitle, rank;
  
  if(score >= 800){
    title = "🏆 ВОРОШИЛОВСКИЙ СТРЕЛОК! 🏆";
    subtitle = "Ваше стратегическое видение и безупречное исполнение задач вызывают глубокое уважение. " +
            "Вы установили новый стандарт профессионализма. Хотим пожелать новых побед и искренне поздравляем вас с Днём защитника Отечества!";
    rank = "h1";
  } else if(score >= 450){
    title = "⭐ ГВАРДЕЙСКИЙ ОФИЦЕР! ⭐";
    subtitle = "Командир отличился! Ваше умение предвидеть риски и принимать взвешенные решения обеспечивает " +
            "стабильность всему коллективу. Ваш вклад в развитие компании неоценим. Желаем вам достигать все новых высот, С праздником!";
    rank = "h2";
  } else if(score >= 250){
    title = "🎖️ ЛУЧШИЙ БОЕЦ АУДИТА! 🎖️";
    subtitle = "Надёжный тыл — залог победы! Настоящий защитник от мошенников, НЖЯ и рисков. Хотим пожелать вам побед" +
            " и новых свершений! С праздником 23 февраля !";

    rank = "h3";
  } else if(score >= 100){
    title = "🛡️ БОЕЦ НЕВИДИМОГО ФРОНТА! 🛡️";
    subtitle = "Тихий профессионал! Работает чётко, без лишнего шума. Центральный штаб отметит выдержку и хладнокровие!" +
            " Желаем минимум стресса и максимум положительных эмоций, с праздником 23 февраля";
    rank = "h4";
  } else if(score >= 50){
    title = "⚔️ МОЛОДОЙ БОЕЦ! ⚔️";
    subtitle = "Первый бой — первые победы! Виден потенциал командира. Поздравляем с Днем защитника Отечества и желаем только побед!";
    rank = "h5";
  } else {
    title = "🎖️ НОВОБРАНЕЦ! 🎖️";
    subtitle = "Служба только начинается! Не надо сдаваться — каждый ас начинал с первого промаха. К следующему 23 февраля все получится, а пока поздравляем и желаем успехов и новых побед!";
    rank = "h5";
  }
  
  return {
    title,
    subtitle,
    rank,
    html: `<${rank}>${title}</${rank}>
           <div class="congrats-score">${score} очков | Уровень ${level}</div>
           <div class="congrats-message">${subtitle}</div>`
  };
}

function endGame(){
  gameOver=true;
  const congratsData = getCongratsMessage(score, level);
  congrats.innerHTML = congratsData.html;
  modal.style.display="flex";
  startBtn.style.display="inline-block";
}

function startGame(){
  score=0;misses=0;level=1;
  fallingItems=[];explosions=[];
  gameOver=false;
  spawnInterval=2500;
  baseSpeed=2;
  lastSpawnTime=performance.now();
  scoreEl.textContent=0;
  missesEl.textContent=0;
  levelEl.textContent=1;
  spawnItem();
  startBtn.style.display="none";
  modal.style.display="none";
}

startBtn.onclick=startGame;
closeModal.onclick=startGame;

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
