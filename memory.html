<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Memory — 8 Марта</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-100: #fce4ec;
      --pink-200: #f8bbd0;
      --pink-300: #f48fb1;
      --pink-400: #e91e8c;
      --rose:     #f06292;
      --rose-deep:#c2185b;
      --cream:    #fff9f5;
      --warm:     #fdf0f5;
      --text:     #3a1a2e;
      --muted:    #b07090;
      --card-bg:  #ffffff;
      --shadow:   0 8px 32px rgba(180,60,110,0.13);
      --radius:   18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── background petals ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, #fce4ec88 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 80%, #f8bbd088 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 50% 50%, #fff0f588 0%, transparent 80%);
      pointer-events: none; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "header  header"
        "main    sidebar";
      gap: 0;
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── HEADER ── */
    header {
      grid-area: header;
      text-align: center;
      padding-bottom: 20px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: var(--rose-deep);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
      font-weight: 300;
    }

    /* ── MAIN ── */
    main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-right: 20px;
    }

    /* ── LEVEL STRIP ── */
    .levels {
      display: flex;
      gap: 10px;
      background: white;
      padding: 10px 14px;
      border-radius: 50px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 520px;
      justify-content: center;
    }

    .level-btn {
      padding: 8px 20px;
      border-radius: 30px;
      border: 2px solid var(--pink-200);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }

    .level-btn.done {
      background: #f0f0f0;
      border-color: #ddd;
      color: #aaa;
    }

    .level-btn.done::after {
      content: '✓';
      position: absolute;
      top: -6px; right: -6px;
      background: #bbb;
      color: white;
      width: 16px; height: 16px;
      border-radius: 50%;
      font-size: 9px;
      display: grid; place-items: center;
    }

    .level-btn.active {
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(194,24,91,0.35);
      transform: translateY(-2px);
    }

    .level-btn:not(.done):not(.active):hover {
      border-color: var(--rose);
      color: var(--rose-deep);
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat {
      background: white;
      border-radius: 12px;
      padding: 8px 18px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .stat-icon { font-size: 1.1rem; }
    .stat-val  { font-weight: 700; color: var(--rose-deep); font-size: 1.05rem; }

    /* ── GAME BOARD ── */
    #game-wrap {
      width: 100%;
      max-width: 520px;
    }

    #game {
      display: grid;
      gap: 10px;
      width: 100%;
    }

    /* ── CARD ── */
    .card {
      aspect-ratio: 1;
      cursor: pointer;
      perspective: 800px;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.23,1,0.32,1);
      border-radius: var(--radius);
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      animation: matchPop 0.35s ease forwards, fadeOut 0.5s ease 0.6s forwards;
    }

    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.14); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: rotateY(180deg) scale(0.85); }
    }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
    }

    .card-back {
      background: linear-gradient(145deg, var(--pink-200), var(--pink-300));
      border: 2px solid var(--pink-200);
      box-shadow: var(--shadow);
    }

    .card-back-deco {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      opacity: 0.6;
      user-select: none;
    }

    .card-front {
      background: white;
      transform: rotateY(180deg);
      border: 2px solid var(--pink-100);
      box-shadow: var(--shadow);
      font-size: clamp(1.5rem, 5vw, 3.2rem);
    }

    .card:hover:not(.flipped):not(.matched) .card-back {
      background: linear-gradient(145deg, var(--pink-300), var(--rose));
      transform: scale(1.04);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      grid-area: sidebar;
      width: 210px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 4px;
    }

    .panel {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--rose-deep);
      margin-bottom: 10px;
      border-bottom: 1px solid var(--pink-100);
      padding-bottom: 6px;
    }

    /* ── BONUS DISPLAY ── */
    .bonus-inactive {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 8px 0;
    }

    .bonus-active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .bonus-mult {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--rose-deep);
      line-height: 1;
    }

    .bonus-mult.super {
      color: #ff6b00;
      text-shadow: 0 0 20px rgba(255,107,0,0.4);
      animation: superGlow 1s ease infinite alternate;
    }

    @keyframes superGlow {
      from { text-shadow: 0 0 10px rgba(255,107,0,0.3); }
      to   { text-shadow: 0 0 30px rgba(255,107,0,0.7); }
    }

    .bonus-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    .bonus-bar-wrap {
      width: 100%;
      height: 8px;
      background: var(--pink-100);
      border-radius: 4px;
      overflow: hidden;
    }

    .bonus-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--rose-deep));
      border-radius: 4px;
      transition: width 0.1s linear;
    }

    .bonus-bar.warning {
      background: linear-gradient(90deg, #ff9800, #ff5722);
    }

    .bonus-time {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--rose-deep);
    }

    .streak-dots {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 4px;
    }

    .streak-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--pink-100);
      border: 2px solid var(--pink-200);
      transition: all 0.3s;
    }

    .streak-dot.filled {
      background: var(--rose);
      border-color: var(--rose-deep);
      box-shadow: 0 0 6px rgba(240,98,146,0.6);
    }

    /* ── SCORE PANEL ── */
    .score-total {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--rose-deep);
      text-align: center;
      font-weight: 700;
    }

    .score-sub {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 2px;
    }

    .score-breakdown {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .score-row span:last-child {
      font-weight: 600;
      color: var(--text);
    }

    /* ── NEW GAME BTN ── */
    .new-game-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(194,24,91,0.3);
      transition: all 0.25s;
    }

    .new-game-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(194,24,91,0.45);
    }

    /* ── SCORE POPUP ── */
    .score-popup {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--rose-deep);
      pointer-events: none;
      z-index: 100;
      animation: floatUp 1s ease forwards;
      white-space: nowrap;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      80%  { opacity: 1; transform: translateY(-50px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
    }

    /* ── WIN MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(60,10,40,0.55);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: grid;
      place-items: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
    }

    .modal {
      background: var(--cream);
      border-radius: 28px;
      padding: 44px 40px;
      text-align: center;
      max-width: 440px;
      width: 90vw;
      box-shadow: 0 30px 80px rgba(100,10,60,0.35);
      animation: modalPop 0.5s cubic-bezier(0.23,1,0.32,1);
      position: relative;
      overflow: hidden;
    }

    .modal::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #fce4ec88, transparent 60%);
      pointer-events: none;
    }

    @keyframes modalPop {
      from { transform: scale(0.7) translateY(30px); opacity: 0; }
    }

    .modal-emoji { font-size: 3.5rem; margin-bottom: 8px; }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--rose-deep);
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .modal-sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .modal-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .modal-stat {
      background: white;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 12px rgba(180,60,110,0.1);
    }

    .modal-stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--rose-deep);
      font-weight: 700;
    }

    .modal-stat-lbl {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-next-btn, .modal-restart-btn {
      padding: 14px 32px;
      border-radius: 30px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      margin: 6px;
    }

    .modal-next-btn {
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white;
      box-shadow: 0 4px 16px rgba(194,24,91,0.35);
    }

    .modal-next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(194,24,91,0.5); }

    .modal-restart-btn {
      background: white;
      color: var(--rose-deep);
      border: 2px solid var(--pink-200);
    }

    .modal-restart-btn:hover { border-color: var(--rose); }

    .final-score {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--rose-deep);
      font-weight: 700;
      margin: 8px 0;
    }

    /* ── CONFETTI ── */
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── STATUS LINE ── */
    #status {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
      text-align: center;
      min-height: 1.4em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-areas: "header" "main" "sidebar";
        padding: 16px 14px;
      }

      main { padding-right: 0; }

      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .sidebar .panel { flex: 1; min-width: 140px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <h1>🌸 Цветочный Сад Тайн</h1>
    <p>Игра памяти · 8 Марта</p>
  </header>

  <!-- MAIN -->
  <main>

    <!-- Level selector -->
    <div class="levels" id="levels">
      <button class="level-btn active" data-level="0">2 × 2</button>
      <button class="level-btn" data-level="1">4 × 4</button>
      <button class="level-btn" data-level="2">6 × 6</button>
      <button class="level-btn" data-level="3">8 × 8</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat"><span class="stat-icon">⏱️</span> Уровень: <span class="stat-val" id="level-timer">00:00</span></div>
      <div class="stat"><span class="stat-icon">💎</span> Очки: <span class="stat-val" id="score-display">0</span></div>
      <div class="stat"><span class="stat-icon">🔄</span> Ходов: <span class="stat-val" id="moves-display">0</span></div>
    </div>

    <div id="status">Выбери уровень и начинай 🌷</div>

    <!-- Board -->
    <div id="game-wrap">
      <div id="game"></div>
    </div>

  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Bonus panel -->
    <div class="panel" id="bonus-panel">
      <h3>⚡ Бонус</h3>
      <div id="bonus-content">
        <div class="bonus-inactive">Собери пару, чтобы активировать бонус</div>
      </div>
    </div>

    <!-- Score panel -->
    <div class="panel">
      <h3>🏆 Счёт</h3>
      <div class="score-total" id="total-score">0</div>
      <div class="score-sub">суммарно за все уровни</div>
      <div class="score-breakdown" id="score-breakdown"></div>
    </div>

    <!-- Time panel -->
    <div class="panel">
      <h3>⌛ Время</h3>
      <div class="score-total" id="total-time">0:00</div>
      <div class="score-sub">суммарно за все уровни</div>
      <div class="score-breakdown" id="time-breakdown"></div>
    </div>

    <button class="new-game-btn" id="new-game-btn">Начать заново</button>

  </aside>

</div>

<!-- WIN MODAL (injected dynamically) -->

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const LEVELS = [
  { grid: 2, label: '2 × 2' },
  { grid: 4, label: '4 × 4' },
  { grid: 6, label: '6 × 6' },
  { grid: 8, label: '8 × 8' },
];

const BASE_SCORE   = 10;
const BONUS_TOTAL  = 6000;   // ms
const BONUS_WARN   = 3000;   // ms when mult drops to 1.5x
const STREAK_TARGET = 5;     // pairs to trigger 5x
const SUPER_DUR    = 10000;  // ms for 5x bonus

const SYMBOLS = [
  '🌸','🌺','💐','🎁','👗','💄','👑','💖','🦋','💝',
  '🌼','⭐','🌷','💎','🎀','🌹','🫖','👠','💅','👜',
  '💍','🌻','🍓','🍒','🪻','🪷','🧁','🎶','🦚','🌙',
  '🐝','🫐',
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentLevel  = 0;
let completedLevels = [];    // array of {score, time}
let levelScores   = {};      // { levelIdx: score }
let levelTimes    = {};      // { levelIdx: seconds }

let cards = [];
let flipped = [];
let matched = 0;
let totalPairs = 0;
let moves = 0;
let levelScore = 0;

// Timer
let levelStart = null;
let levelTimerId = null;

// Bonus
let bonusActive = false;
let bonusStart  = null;
let bonusTimer  = null;
let bonusMult   = 2;
let streak      = 0;       // consecutive matched pairs with bonus
let superBonus  = false;
let superStart  = null;
let superTimer  = null;

let bonusRafId  = null;

// ═══════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════
const gameEl        = document.getElementById('game');
const statusEl      = document.getElementById('status');
const levelTimerEl  = document.getElementById('level-timer');
const scoreDisplayEl= document.getElementById('score-display');
const movesDisplayEl= document.getElementById('moves-display');
const bonusContent  = document.getElementById('bonus-content');
const totalScoreEl  = document.getElementById('total-score');
const totalTimeEl   = document.getElementById('total-time');
const scoreBreakEl  = document.getElementById('score-breakdown');
const timeBreakEl   = document.getElementById('time-breakdown');
const newGameBtn    = document.getElementById('new-game-btn');

// ═══════════════════════════════════════════════
//  LEVEL BUTTONS
// ═══════════════════════════════════════════════
document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = parseInt(btn.dataset.level);
    currentLevel = idx;
    updateLevelButtons();
    initGame(idx);
  });
});

function updateLevelButtons() {
  document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
    const idx = parseInt(btn.dataset.level);
    btn.className = 'level-btn';
    if (completedLevels.includes(idx)) btn.classList.add('done');
    if (idx === currentLevel)          btn.classList.add('active');
  });
}

// ═══════════════════════════════════════════════
//  INIT GAME
// ═══════════════════════════════════════════════
function initGame(levelIdx) {
  const { grid } = LEVELS[levelIdx];
  totalPairs = (grid * grid) / 2;

  // Shuffle symbols
  const syms = SYMBOLS.slice(0, totalPairs);
  let deck   = [...syms, ...syms];
  deck.sort(() => Math.random() - 0.5);

  // Reset state
  cards    = [];
  flipped  = [];
  matched  = 0;
  moves    = 0;
  levelScore = 0;
  streak   = 0;
  levelStart = null;
  clearInterval(levelTimerId);
  levelTimerId = null;

  stopBonus();
  stopSuper();

  // Build grid
  gameEl.innerHTML = '';
  gameEl.style.gridTemplateColumns = `repeat(${grid}, 1fr)`;
  gameEl.style.gap = grid <= 4 ? '12px' : grid <= 6 ? '9px' : '7px';

  deck.forEach((sym, i) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'card';
    cardEl.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"><span class="card-back-deco">🌸</span></div>
        <div class="card-face card-front">${sym}</div>
      </div>`;
    cardEl.dataset.symbol = sym;
    cardEl.addEventListener('click', () => handleClick(cardEl));
    gameEl.appendChild(cardEl);
    cards.push({ el: cardEl, symbol: sym, flipped: false, matched: false });
  });

  updateScoreDisplay();
  statusEl.textContent = `Найди ${totalPairs} пар! 🌷`;
  renderBonusPanel();
  renderBreakdowns();
  updateLevelButtons();
}

// ═══════════════════════════════════════════════
//  CARD CLICK
// ═══════════════════════════════════════════════
function handleClick(cardEl) {
  if (flipped.length >= 2) return;
  const card = cards.find(c => c.el === cardEl);
  if (!card || card.flipped || card.matched) return;

  // Start timer
  if (!levelStart) {
    levelStart = Date.now();
    levelTimerId = setInterval(tickLevelTimer, 1000);
  }

  card.flipped = true;
  cardEl.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    movesDisplayEl.textContent = moves;

    setTimeout(checkMatch, 650);
  }
}

function checkMatch() {
  const [a, b] = flipped;

  if (a.symbol === b.symbol) {
    // MATCH
    a.matched = b.matched = true;
    matched++;
    streak++;

    // Score
    let mult = getCurrentMult();
    const earned = Math.round(BASE_SCORE * mult);
    levelScore += earned;

    // Show score popup
    showScorePopup(a.el, `+${earned}`, mult > 1);

    // Mark matched (triggers CSS animation)
    a.el.classList.add('matched');
    b.el.classList.add('matched');

    // Check super streak
    if (!superBonus && bonusActive && streak >= STREAK_TARGET) {
      const elapsed = Date.now() - bonusStart;
      if (elapsed < BONUS_WARN) { // still in 2x window
        activateSuperBonus();
      }
    }

    // Reset / restart bonus
    startBonus();

    updateScoreDisplay();

    if (matched === totalPairs) {
      setTimeout(handleLevelWin, 900);
    }

  } else {
    // No match
    streak = 0;
    a.flipped = b.flipped = false;
    a.el.classList.remove('flipped');
    b.el.classList.remove('flipped');
  }

  flipped = [];
}

// ═══════════════════════════════════════════════
//  BONUS SYSTEM
// ═══════════════════════════════════════════════
function getCurrentMult() {
  if (superBonus) return 5;
  if (!bonusActive) return 1;
  const elapsed = Date.now() - bonusStart;
  if (elapsed < BONUS_WARN) return 2;
  return 1.5;
}

function startBonus() {
  stopBonus(); // clear existing
  if (superBonus) return; // don't override super

  bonusActive = true;
  bonusStart  = Date.now();
  bonusMult   = 2;

  bonusTimer = setTimeout(() => {
    bonusActive = false;
    streak      = 0;
    renderBonusPanel();
  }, BONUS_TOTAL);

  // RAF for progress bar
  animateBonus();
}

function stopBonus() {
  bonusActive = false;
  clearTimeout(bonusTimer);
  cancelAnimationFrame(bonusRafId);
}

function activateSuperBonus() {
  stopBonus();
  superBonus = true;
  superStart = Date.now();
  streak     = 0;

  superTimer = setTimeout(() => {
    superBonus = false;
    streak     = 0;
    renderBonusPanel();
  }, SUPER_DUR);

  animateBonus();
}

function stopSuper() {
  superBonus = false;
  clearTimeout(superTimer);
}

function animateBonus() {
  cancelAnimationFrame(bonusRafId);
  function frame() {
    renderBonusPanel();
    if (bonusActive || superBonus) {
      bonusRafId = requestAnimationFrame(frame);
    }
  }
  bonusRafId = requestAnimationFrame(frame);
}

function renderBonusPanel() {
  if (!bonusActive && !superBonus) {
    bonusContent.innerHTML = `<div class="bonus-inactive">Собери пару, чтобы активировать бонус 🌸</div>`;
    return;
  }

  let totalMs, elapsed, mult, label, isWarning, isSuper;

  if (superBonus) {
    totalMs  = SUPER_DUR;
    elapsed  = Date.now() - superStart;
    mult     = 5;
    label    = 'СУПЕРСТРИК! 🔥';
    isWarning = false;
    isSuper  = true;
  } else {
    totalMs  = BONUS_TOTAL;
    elapsed  = Date.now() - bonusStart;
    mult     = elapsed < BONUS_WARN ? 2 : 1.5;
    label    = elapsed < BONUS_WARN ? 'двойные очки' : 'x1.5 очки';
    isWarning = elapsed >= BONUS_WARN;
    isSuper  = false;
  }

  const remaining = Math.max(0, totalMs - elapsed);
  const pct       = (remaining / totalMs) * 100;
  const secs      = (remaining / 1000).toFixed(1);

  // Streak dots
  const dots = Array.from({length: STREAK_TARGET}, (_, i) =>
    `<div class="streak-dot ${i < streak ? 'filled' : ''}"></div>`
  ).join('');

  bonusContent.innerHTML = `
    <div class="bonus-active">
      <div class="bonus-mult ${isSuper ? 'super' : ''}">${mult}×</div>
      <div class="bonus-label">${label}</div>
      <div class="bonus-bar-wrap">
        <div class="bonus-bar ${isWarning ? 'warning' : ''}" style="width:${pct}%"></div>
      </div>
      <div class="bonus-time">${secs}s</div>
      ${!isSuper ? `<div class="bonus-label">Стрик до 5×:</div><div class="streak-dots">${dots}</div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════
//  TIMERS
// ═══════════════════════════════════════════════
function tickLevelTimer() {
  if (!levelStart) return;
  const sec = Math.floor((Date.now() - levelStart) / 1000);
  levelTimerEl.textContent = fmtTime(sec);
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2,'0');
  const s = (sec % 60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function getLevelElapsed() {
  if (!levelStart) return 0;
  return Math.floor((Date.now() - levelStart) / 1000);
}

// ═══════════════════════════════════════════════
//  SCORE DISPLAY
// ═══════════════════════════════════════════════
function updateScoreDisplay() {
  scoreDisplayEl.textContent = levelScore;

  const allPrev = Object.values(levelScores).reduce((a,b) => a+b, 0);
  totalScoreEl.textContent = allPrev + levelScore;
}

function renderBreakdowns() {
  let sHtml = '', tHtml = '';
  LEVELS.forEach((lv, i) => {
    const sc = levelScores[i] ?? '—';
    const ti = levelTimes[i]  != null ? fmtTime(levelTimes[i]) : '—';
    sHtml += `<div class="score-row"><span>${lv.label}</span><span>${sc}</span></div>`;
    tHtml += `<div class="score-row"><span>${lv.label}</span><span>${ti}</span></div>`;
  });
  scoreBreakEl.innerHTML = sHtml;
  timeBreakEl.innerHTML  = tHtml;

  // Total time
  const totalSec = Object.values(levelTimes).reduce((a,b) => a+b, 0);
  totalTimeEl.textContent = fmtTime(totalSec);
}

// ═══════════════════════════════════════════════
//  SCORE POPUP
// ═══════════════════════════════════════════════
function showScorePopup(cardEl, text, isBonus) {
  const rect = cardEl.getBoundingClientRect();
  const pop  = document.createElement('div');
  pop.className = 'score-popup';
  pop.textContent = text;
  pop.style.left  = `${rect.left + rect.width/2}px`;
  pop.style.top   = `${rect.top}px`;
  pop.style.color = isBonus ? '#ff6b00' : 'var(--rose-deep)';
  pop.style.fontSize = isBonus ? '1.8rem' : '1.4rem';
  pop.style.position = 'fixed';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

// ═══════════════════════════════════════════════
//  LEVEL WIN
// ═══════════════════════════════════════════════
function handleLevelWin() {
  clearInterval(levelTimerId);
  stopBonus(); stopSuper();
  cancelAnimationFrame(bonusRafId);

  const elapsed = getLevelElapsed();
  levelScores[currentLevel] = levelScore;
  levelTimes[currentLevel]  = elapsed;

  if (!completedLevels.includes(currentLevel)) {
    completedLevels.push(currentLevel);
  }

  renderBreakdowns();
  updateLevelButtons();
  statusEl.textContent = '';

  const isAllDone = completedLevels.length === LEVELS.length;
  showWinModal(isAllDone, elapsed);
  spawnConfetti();
}

function showWinModal(isAllDone, elapsed) {
  const allScore = Object.values(levelScores).reduce((a,b) => a+b, 0);
  const allTime  = Object.values(levelTimes).reduce((a,b) => a+b, 0);
  const nextIdx  = currentLevel + 1;
  const hasNext  = nextIdx < LEVELS.length;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-emoji">${isAllDone ? '🎊' : '🌸'}</div>
      <h2>${isAllDone ? 'С 8 Марта! 🌹' : 'Уровень пройден!'}</h2>
      <p class="modal-sub">${isAllDone
        ? 'Все уровни пройдены! Поздравляем с праздником весны!'
        : 'Отлично! Продолжай в том же духе 💐'}</p>

      ${isAllDone ? `<div class="final-score">${allScore}</div><div class="score-sub">итоговый счёт</div>` : ''}

      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-val">${levelScore}</div>
          <div class="modal-stat-lbl">очков за уровень</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val">${fmtTime(elapsed)}</div>
          <div class="modal-stat-lbl">время уровня</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val">${allScore}</div>
          <div class="modal-stat-lbl">всего очков</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val">${fmtTime(allTime)}</div>
          <div class="modal-stat-lbl">всего времени</div>
        </div>
      </div>

      <div>
        ${hasNext && !isAllDone ? `<button class="modal-next-btn" id="modal-next">Следующий уровень →</button>` : ''}
        <button class="modal-restart-btn" id="modal-restart">Сыграть снова</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  overlay.querySelector('#modal-restart')?.addEventListener('click', () => {
    overlay.remove();
    initGame(currentLevel);
  });

  overlay.querySelector('#modal-next')?.addEventListener('click', () => {
    overlay.remove();
    currentLevel = nextIdx;
    updateLevelButtons();
    initGame(currentLevel);
  });
}

// ═══════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════
function spawnConfetti() {
  const colors = ['#f48fb1','#f06292','#c2185b','#fce4ec','#ffd54f','#81d4fa'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      const size = 8 + Math.random() * 8;
      c.style.cssText = `
        position:fixed; top:-20px;
        left:${Math.random() * 100}vw;
        width:${size}px; height:${size}px;
        background:${colors[~~(Math.random()*colors.length)]};
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        pointer-events:none; z-index:999;
        animation: confettiFall ${1.8 + Math.random()*2.2}s linear forwards;
        opacity:0.9;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4200);
    }, i * 35);
  }
}

// ═══════════════════════════════════════════════
//  NEW GAME BUTTON
// ═══════════════════════════════════════════════
newGameBtn.addEventListener('click', () => {
  // Full reset
  completedLevels = [];
  levelScores     = {};
  levelTimes      = {};
  currentLevel    = 0;
  updateLevelButtons();
  renderBreakdowns();
  totalScoreEl.textContent = '0';
  totalTimeEl.textContent  = '0:00';
  initGame(0);
});

// ═══════════════════════════════════════════════
//  CONFETTI CSS
// ═══════════════════════════════════════════════
const style = document.createElement('style');
style.textContent = `
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
`;
document.head.appendChild(style);

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
initGame(0);
</script>
