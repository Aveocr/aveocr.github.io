<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Memory — 8 Марта</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-100: #fce4ec;
      --pink-200: #f8bbd0;
      --pink-300: #f48fb1;
      --rose:     #f06292;
      --rose-deep:#c2185b;
      --cream:    #fff9f5;
      --text:     #3a1a2e;
      --muted:    #b07090;
      --shadow:   0 8px 32px rgba(180,60,110,0.13);
      --radius:   16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 15%, #fce4ecaa 0%, transparent 65%),
        radial-gradient(ellipse 50% 55% at 90% 85%, #f8bbd0aa 0%, transparent 65%),
        radial-gradient(ellipse 45% 45% at 55% 50%, #fff0f599 0%, transparent 75%);
      pointer-events: none; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 230px;
      grid-template-rows: auto 1fr;
      grid-template-areas: "header header" "main sidebar";
      min-height: 100vh;
      max-width: 1120px;
      margin: 0 auto;
      padding: 22px 18px;
    }

    /* ── HEADER ── */
    header {
      grid-area: header;
      text-align: center;
      padding-bottom: 18px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5.5vw, 3rem);
      color: var(--rose-deep);
      letter-spacing: -0.5px;
    }
    header p { color: var(--muted); font-size: 0.92rem; margin-top: 3px; font-weight: 300; }

    /* ── MAIN ── */
    main {
      grid-area: main;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding-right: 18px;
    }

    /* ── LEVEL STRIP ── */
    .levels {
      display: flex; gap: 7px;
      background: white; padding: 8px 12px;
      border-radius: 50px; box-shadow: var(--shadow);
      justify-content: center; flex-wrap: wrap;
      width: 100%; max-width: 600px;
    }
    .level-btn {
      padding: 7px 15px; border-radius: 30px;
      border: 2px solid var(--pink-200);
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.87rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
      position: relative; white-space: nowrap;
    }
    .level-btn.done { background: #f0f0f0; border-color: #ddd; color: #aaa; }
    .level-btn.done::after {
      content: '✓'; position: absolute; top: -6px; right: -6px;
      background: var(--rose); color: white; width: 16px; height: 16px;
      border-radius: 50%; font-size: 9px; display: grid; place-items: center;
    }
    .level-btn.active {
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white; border-color: transparent;
      box-shadow: 0 4px 14px rgba(194,24,91,0.38); transform: translateY(-2px);
    }
    .level-btn.optional-badge { border-style: dashed; border-color: #ffb7d5; color: #e07aaa; }
    .level-btn.optional-badge::before { content: '★ '; font-size: 0.72rem; }
    .level-btn:not(.done):not(.active):not([disabled]):hover { border-color: var(--rose); color: var(--rose-deep); }
    .level-btn[disabled] { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── STATS BAR ── */
    .stats-bar { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .stat {
      background: white; border-radius: 11px;
      padding: 7px 15px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 6px;
      font-size: 0.88rem; font-weight: 500;
    }
    .stat-val { font-weight: 700; color: var(--rose-deep); font-size: 0.98rem; }

    /* ── ACTION BUTTONS ── */
    .action-bar { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; }
    .btn-surrender {
      padding: 8px 18px; border-radius: 30px;
      border: 2px solid #ffb7d5; background: white;
      color: #c2185b; font-family: 'DM Sans', sans-serif;
      font-size: 0.87rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-surrender:hover { background: var(--pink-100); border-color: var(--rose); }
    .btn-all-congrats {
      padding: 8px 18px; border-radius: 30px;
      border: 2px solid var(--pink-200); background: white;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.87rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-all-congrats:hover { border-color: var(--rose); color: var(--rose-deep); }

    #status { font-size: 0.93rem; color: var(--muted); text-align: center; min-height: 1.4em; }

    /* ── GAME BOARD ── */
    #game-wrap { width: 100%; max-width: 520px; }
    #game { display: grid; width: 100%; }

    /* ── CARD ── */
    .card { aspect-ratio: 1; cursor: pointer; perspective: 800px; }
    .card-inner {
      width: 100%; height: 100%;
      position: relative; transform-style: preserve-3d;
      transition: transform 0.52s cubic-bezier(0.23,1,0.32,1);
      border-radius: var(--radius);
    }
    .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
    .card.matched .card-inner {
      animation: matchPop 0.32s ease forwards, fadeOut 0.45s ease 0.6s forwards;
    }
    @keyframes matchPop {
      0%  { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.13); }
      100%{ transform: rotateY(180deg) scale(1); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: rotateY(180deg) scale(0.8); }
    }
    .card-face {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: var(--radius); display: grid; place-items: center;
    }
    .card-back {
      background: linear-gradient(145deg, #ffd6e8, var(--pink-300));
      border: 2px solid var(--pink-200); box-shadow: var(--shadow);
    }
    .card-back-inner { font-size: clamp(1rem, 3.2vw, 2.2rem); opacity: 0.5; user-select: none; }
    .card-front {
      background: white; transform: rotateY(180deg);
      border: 2px solid var(--pink-100); box-shadow: var(--shadow);
      font-size: clamp(1.1rem, 3.8vw, 2.6rem);
    }
    .card:hover:not(.flipped):not(.matched) .card-back {
      background: linear-gradient(145deg, var(--pink-300), var(--rose));
    }

    /* ── SIDEBAR ── */
    .sidebar { grid-area: sidebar; display: flex; flex-direction: column; gap: 11px; padding-top: 2px; }
    .panel { background: white; border-radius: var(--radius); padding: 13px; box-shadow: var(--shadow); }
    .panel h3 {
      font-family: 'Playfair Display', serif; font-size: 0.88rem; color: var(--rose-deep);
      margin-bottom: 8px; border-bottom: 1px solid var(--pink-100); padding-bottom: 5px;
    }

    /* Bonus */
    .bonus-inactive { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 5px 0; }
    .bonus-active { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bonus-mult { font-family: 'Playfair Display', serif; font-size: 2.1rem; font-weight: 700; color: var(--rose-deep); line-height: 1; }
    .bonus-mult.super { color: #ff6b00; animation: superGlow 1s ease infinite alternate; }
    @keyframes superGlow {
      from { text-shadow: 0 0 8px rgba(255,107,0,0.3); }
      to   { text-shadow: 0 0 28px rgba(255,107,0,0.8); }
    }
    .bonus-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; }
    .bonus-bar-wrap { width: 100%; height: 6px; background: var(--pink-100); border-radius: 4px; overflow: hidden; }
    .bonus-bar { height: 100%; background: linear-gradient(90deg, var(--rose), var(--rose-deep)); border-radius: 4px; }
    .bonus-bar.warn { background: linear-gradient(90deg, #ff9800, #ff5722); }
    .bonus-time { font-size: 0.75rem; font-weight: 600; color: var(--rose-deep); }
    .streak-dots { display: flex; gap: 3px; justify-content: center; }
    .streak-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink-100); border: 2px solid var(--pink-200); transition: all 0.3s; }
    .streak-dot.filled { background: var(--rose); border-color: var(--rose-deep); box-shadow: 0 0 5px rgba(240,98,146,0.5); }

    /* Score / Time */
    .score-total { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: var(--rose-deep); text-align: center; font-weight: 700; }
    .score-sub { font-size: 0.7rem; color: var(--muted); text-align: center; margin-top: 1px; }
    .score-breakdown { margin-top: 7px; display: flex; flex-direction: column; gap: 3px; }
    .score-row { display: flex; justify-content: space-between; font-size: 0.74rem; color: var(--muted); }
    .score-row span:last-child { font-weight: 600; color: var(--text); }

    /* Sidebar buttons */
    .new-game-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 14px rgba(194,24,91,0.28); transition: all 0.25s;
    }
    .new-game-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(194,24,91,0.42); }

    /* Score popup */
    .score-popup {
      position: fixed; font-family: 'Playfair Display', serif; font-weight: 700;
      pointer-events: none; z-index: 100;
      animation: floatUp 1s ease forwards; white-space: nowrap;
    }
    @keyframes floatUp {
      0%  { opacity: 1; transform: translateY(0) scale(1); }
      80% { opacity: 1; transform: translateY(-48px) scale(1.1); }
      100%{ opacity: 0; transform: translateY(-65px) scale(0.9); }
    }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(55,8,35,0.58);
      backdrop-filter: blur(12px);
      z-index: 200; display: grid; place-items: center;
      animation: fadeInBg 0.35s ease; padding: 16px;
    }
    @keyframes fadeInBg { from { opacity: 0; } }
    .modal {
      background: var(--cream); border-radius: 28px;
      padding: 36px 32px; text-align: center;
      max-width: 520px; width: 100%;
      box-shadow: 0 32px 90px rgba(90,5,50,0.38);
      animation: modalPop 0.45s cubic-bezier(0.23,1,0.32,1);
      position: relative; overflow: hidden;
      max-height: 92vh; overflow-y: auto;
    }
    .modal::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% -10%, #fce4ecbb, transparent 55%);
      pointer-events: none;
    }
    @keyframes modalPop { from { transform: scale(0.68) translateY(32px); opacity: 0; } }

    .modal-emoji { font-size: 2.8rem; margin-bottom: 5px; position: relative; z-index: 1; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: var(--rose-deep); line-height: 1.15; margin-bottom: 4px; position: relative; z-index: 1; }
    .modal-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 16px; line-height: 1.55; position: relative; z-index: 1; }

    /* BOUQUET display */
    .bouquet-display {
      position: relative; z-index: 1;
      margin: 12px auto 18px;
      font-size: 2.1rem;
      letter-spacing: 2px;
      line-height: 1.5;
      padding: 14px 18px;
      background: linear-gradient(135deg, #fce4ec99, #fff9f5);
      border-radius: 16px;
      border: 1px solid var(--pink-200);
    }
    .bouquet-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; }

    /* CONGRATS TEXT */
    .congrats-text {
      background: linear-gradient(135deg, #fce4ec66, #fff9f5);
      border-radius: 14px; padding: 15px 18px;
      margin-bottom: 16px; border: 1px solid var(--pink-200);
      font-size: 0.95rem; line-height: 1.72; color: var(--text);
      font-style: italic; text-align: left; position: relative; z-index: 1;
    }

    /* Stats grid */
    .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; position: relative; z-index: 1; }
    .modal-stat { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 3px 10px rgba(180,60,110,0.1); }
    .modal-stat-val { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--rose-deep); font-weight: 700; }
    .modal-stat-lbl { font-size: 0.69rem; color: var(--muted); margin-top: 2px; }

    .final-score { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--rose-deep); font-weight: 700; margin: 5px 0 3px; position: relative; z-index: 1; }
    .score-rank { display: inline-block; padding: 4px 14px; background: var(--pink-100); border-radius: 20px; color: var(--rose-deep); font-size: 0.84rem; font-weight: 600; margin-bottom: 12px; position: relative; z-index: 1; }

    /* Modal buttons */
    .modal-btns { position: relative; z-index: 1; display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-top: 8px; }
    .btn-primary {
      padding: 11px 22px; border-radius: 30px; border: none;
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 14px rgba(194,24,91,0.32); transition: all 0.25s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(194,24,91,0.48); }
    .btn-outline {
      padding: 10px 20px; border-radius: 30px;
      border: 2px solid var(--pink-200); background: white;
      color: var(--rose-deep); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-outline:hover { border-color: var(--rose); background: var(--pink-100); }
    .btn-dashed {
      padding: 10px 20px; border-radius: 30px;
      border: 2px dashed #ffb7d5; background: transparent;
      color: var(--rose-deep); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-dashed:hover { background: var(--pink-100); border-color: var(--rose); }
    .btn-ghost {
      padding: 8px 16px; border-radius: 30px;
      border: 1.5px solid var(--pink-200); background: white;
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-ghost:hover { border-color: var(--rose); color: var(--rose-deep); }

    /* ── ALL CONGRATS MODAL ── */
    .all-modal { max-width: 580px; }
    .cg-list { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; text-align: left; position: relative; z-index: 1; }
    .cg-item { border-radius: 13px; padding: 12px 14px; border: 1.5px solid var(--pink-200); position: relative; }
    .cg-item.unlocked { background: linear-gradient(135deg, #fce4ec44, white); }
    .cg-item.locked { background: #f9f9f9; opacity: 0.58; }
    .cg-title { font-family: 'Playfair Display', serif; font-size: 0.96rem; color: var(--rose-deep); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
    .cg-req { font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; }
    .cg-bouquet { font-size: 1.2rem; letter-spacing: 1px; margin-bottom: 5px; }
    .cg-text { font-size: 0.85rem; line-height: 1.55; color: var(--text); font-style: italic; }
    .cg-badge { position: absolute; top: 9px; right: 10px; background: var(--rose); color: white; font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    /* ── RULES MODAL ── */
    .rules-modal { max-width: 500px; }
    .rules-grid {
      display: grid; gap: 10px; margin: 14px 0 20px;
      text-align: left; position: relative; z-index: 1;
    }
    .rule-row {
      display: flex; align-items: flex-start; gap: 12px;
      background: white; border-radius: 12px;
      padding: 11px 14px; box-shadow: 0 2px 8px rgba(180,60,110,0.08);
      border: 1px solid var(--pink-100);
    }
    .rule-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1; margin-top: 1px; }
    .rule-body { flex: 1; }
    .rule-title { font-weight: 600; color: var(--rose-deep); font-size: 0.9rem; margin-bottom: 2px; }
    .rule-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .rules-tip {
      background: linear-gradient(135deg, #fce4ec55, #fff9f5);
      border-radius: 12px; padding: 10px 14px;
      border: 1px dashed var(--pink-300);
      font-size: 0.84rem; color: var(--muted); line-height: 1.55;
      margin-bottom: 18px; position: relative; z-index: 1; text-align: left;
    }
    .rules-tip strong { color: var(--rose-deep); }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(740deg); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; grid-template-areas: "header" "main" "sidebar"; padding: 12px; }
      main { padding-right: 0; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .sidebar .panel { flex: 1; min-width: 135px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <h1>🌸 Цветочный Сад Тайн</h1>
    <p>Игра памяти · 8 Марта</p>
  </header>

  <main>
    <div class="levels" id="levels">
      <button class="level-btn active" data-level="0">2 × 2</button>
      <button class="level-btn" data-level="1">4 × 4</button>
      <button class="level-btn" data-level="2">6 × 6</button>
      <button class="level-btn optional-badge" data-level="3" id="bonus-level-btn" disabled>8 × 8</button>
    </div>

    <div class="stats-bar">
      <div class="stat">⏱️ <span class="stat-val" id="level-timer">00:00</span></div>
      <div class="stat">💎 <span class="stat-val" id="score-display">0</span></div>
      <div class="stat">🔄 <span class="stat-val" id="moves-display">0</span></div>
    </div>

    <div class="action-bar">
      <button class="btn-surrender" id="btn-surrender" style="display:none">🏳 Сдаться</button>
      <button class="btn-all-congrats" id="btn-all-peek">🌷 Все поздравления</button>
    </div>

    <div id="status">Выбери уровень и начинай 🌷</div>
    <div id="game-wrap"><div id="game"></div></div>
  </main>

  <aside class="sidebar">
    <div class="panel">
      <h3>⚡ Бонус</h3>
      <div id="bonus-content"><div class="bonus-inactive">Собери пару 🌸</div></div>
    </div>
    <div class="panel">
      <h3>🏆 Счёт</h3>
      <div class="score-total" id="total-score">0</div>
      <div class="score-sub">суммарно</div>
      <div class="score-breakdown" id="score-breakdown"></div>
    </div>
    <div class="panel">
      <h3>⌛ Время</h3>
      <div class="score-total" id="total-time">0:00</div>
      <div class="score-sub">суммарно</div>
      <div class="score-breakdown" id="time-breakdown"></div>
    </div>
    <button class="new-game-btn" id="new-game-btn">Начать заново</button>
  </aside>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const LEVELS = [
  { grid: 2, label: '2 × 2' },
  { grid: 4, label: '4 × 4' },
  { grid: 6, label: '6 × 6' },
  { grid: 8, label: '8 × 8', optional: true },
];
const MAIN_LEVELS   = 3;
const BASE_SCORE    = 10;
const BONUS_TOTAL   = 6000;
const BONUS_WARN    = 3000;
const STREAK_TARGET = 5;
const SUPER_DUR     = 10000;

// Flower symbols for cards
const FLOWERS = ['💐','🌷','🌹','🥀','🎀','💗','🌺','🌸','🌼','🌻','🌿','☘️','🍀','🕊️','🌾','🎋','🎍','🌱','🌲','🌞'];

// ═══════════════════════════════════════════════════════
//  CONGRATULATIONS CATALOGUE
//  check(score, timeSec, levelsCompleted, hasBonus)
//  Unlocked when levelsCompleted >= 2 (after level 4×4)
// ═══════════════════════════════════════════════════════
const CONGRATS = [
  // ── Bonus level specific ──
  {
    id: 'perfect',
    title: 'Абсолютное совершенство',
    emoji: '👑',
    req: 'Все 4 раздела проверки + рекордная точность + молниеносное закрытие',
    minLevels: 4,
    check: (s, t, lv, b) => b && lv >= 4 && s >= 600 && t < 480,
    bouquet: ['🌹','🌷','🌸','💐','🪷','🌺','🌼','✨','🌹','🌷','👑'],
    text: 'Это невозможно — и всё же ты сделала это. Все четыре раздела проверки, рекордная точность, молниеносное закрытие. Ты безупречна во всём, что делаешь. С праздником весны, настоящая легенда аудиторского мира! 🌹'
  },
  {
    id: 'bonus_speed',
    title: 'Стремительная чемпионка',
    emoji: '🔥',

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let currentLevel    = 0;
let completedLevels = [];
let levelScores     = {};
let levelTimes      = {};
let bonusLevelDone  = false;
let gameStarted     = false;

let cards = [], flipped = [], matched = 0, totalPairs = 0;
let moves = 0, levelScore = 0;
let levelStart = null, levelTimerId = null;
let bonusActive = false, bonusStart = null, bonusTimer = null;
let superBonus = false, superStart = null, superTimer = null;
let streak = 0, bonusRafId = null;

// ═══════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════
const gameEl          = document.getElementById('game');
const statusEl        = document.getElementById('status');
const levelTimerEl    = document.getElementById('level-timer');
const scoreDisplayEl  = document.getElementById('score-display');
const movesDisplayEl  = document.getElementById('moves-display');
const bonusContent    = document.getElementById('bonus-content');
const totalScoreEl    = document.getElementById('total-score');
const totalTimeEl     = document.getElementById('total-time');
const scoreBreakEl    = document.getElementById('score-breakdown');
const timeBreakEl     = document.getElementById('time-breakdown');
const btnSurrender    = document.getElementById('btn-surrender');
const btnAllPeek      = document.getElementById('btn-all-peek');

// ═══════════════════════════════════════════════════════
//  LEVEL BUTTONS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    currentLevel = parseInt(btn.dataset.level);
    updateLevelButtons();
    initGame(currentLevel);
  });
});

function updateLevelButtons() {
  const mainDone = completedLevels.filter(i => i < MAIN_LEVELS).length === MAIN_LEVELS;
  document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
    const idx  = parseInt(btn.dataset.level);
    const isOp = LEVELS[idx].optional;
    btn.className = 'level-btn' + (isOp ? ' optional-badge' : '');
    if (completedLevels.includes(idx)) btn.classList.add('done');
    if (idx === currentLevel)          btn.classList.add('active');
    if (isOp) btn.disabled = !mainDone;
  });
}

// ═══════════════════════════════════════════════════════
//  INIT GAME
// ═══════════════════════════════════════════════════════
function initGame(idx) {
  const { grid } = LEVELS[idx];
  totalPairs = (grid * grid) / 2;

  const syms = FLOWERS.slice(0, totalPairs);
  let deck = [...syms, ...syms];
  deck.sort(() => Math.random() - 0.5);

  cards = []; flipped = []; matched = 0; moves = 0; levelScore = 0; streak = 0;
  levelStart = null; gameStarted = false;
  clearInterval(levelTimerId); levelTimerId = null;
  stopBonus(); stopSuper();

  gameEl.innerHTML = '';
  gameEl.style.gridTemplateColumns = `repeat(${grid}, 1fr)`;
  gameEl.style.gap = grid <= 2 ? '14px' : grid <= 4 ? '11px' : grid <= 6 ? '8px' : '5px';

  deck.forEach(sym => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="card-inner">
      <div class="card-face card-back"><span class="card-back-inner">🌸</span></div>
      <div class="card-face card-front">${sym}</div>
    </div>`;
    el.dataset.symbol = sym;
    el.addEventListener('click', () => handleClick(el));
    gameEl.appendChild(el);
    cards.push({ el, symbol: sym, flipped: false, matched: false });
  });

  updateScoreDisplay(); movesDisplayEl.textContent = 0; levelTimerEl.textContent = '00:00';
  statusEl.textContent = `Найди ${totalPairs} пар! 🌷`;
  renderBonusPanel(); renderBreakdowns(); updateLevelButtons();
  btnSurrender.style.display = 'none';
}

// ═══════════════════════════════════════════════════════
//  CARD CLICK
// ═══════════════════════════════════════════════════════
function handleClick(cardEl) {
  if (flipped.length >= 2) return;
  const card = cards.find(c => c.el === cardEl);
  if (!card || card.flipped || card.matched) return;

  if (!levelStart) {
    levelStart = Date.now();
    levelTimerId = setInterval(tickLevelTimer, 1000);
    gameStarted = true;
    btnSurrender.style.display = '';
  }

  card.flipped = true; cardEl.classList.add('flipped'); flipped.push(card);
  if (flipped.length === 2) { moves++; movesDisplayEl.textContent = moves; setTimeout(checkMatch, 650); }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.symbol === b.symbol) {
    a.matched = b.matched = true; matched++; streak++;
    const mult  = getCurrentMult();
    const earned = Math.round(BASE_SCORE * mult);
    levelScore += earned;
    showScorePopup(a.el, `+${earned}`, mult > 1);
    a.el.classList.add('matched'); b.el.classList.add('matched');
    if (!superBonus && bonusActive && streak >= STREAK_TARGET && Date.now() - bonusStart < BONUS_WARN) {
      activateSuperBonus();
    }
    startBonus(); updateScoreDisplay();
    if (matched === totalPairs) setTimeout(handleLevelWin, 950);
  } else {
    streak = 0;
    a.flipped = b.flipped = false;
    a.el.classList.remove('flipped'); b.el.classList.remove('flipped');
  }
  flipped = [];
}

// ═══════════════════════════════════════════════════════
//  BONUS
// ═══════════════════════════════════════════════════════
function getCurrentMult() {
  if (superBonus) return 5;
  if (!bonusActive) return 1;
  return Date.now() - bonusStart < BONUS_WARN ? 2 : 1.5;
}
function startBonus() {
  stopBonus(); if (superBonus) return;
  bonusActive = true; bonusStart = Date.now();
  bonusTimer = setTimeout(() => { bonusActive = false; streak = 0; renderBonusPanel(); }, BONUS_TOTAL);
  animateBonus();
}
function stopBonus() { bonusActive = false; clearTimeout(bonusTimer); cancelAnimationFrame(bonusRafId); }
function activateSuperBonus() {
  stopBonus(); superBonus = true; superStart = Date.now(); streak = 0;
  superTimer = setTimeout(() => { superBonus = false; streak = 0; renderBonusPanel(); }, SUPER_DUR);
  animateBonus();
}
function stopSuper() { superBonus = false; clearTimeout(superTimer); }
function animateBonus() {
  cancelAnimationFrame(bonusRafId);
  const f = () => { renderBonusPanel(); if (bonusActive || superBonus) bonusRafId = requestAnimationFrame(f); };
  bonusRafId = requestAnimationFrame(f);
}
function renderBonusPanel() {
  if (!bonusActive && !superBonus) { bonusContent.innerHTML = `<div class="bonus-inactive">Собери пару 🌸</div>`; return; }
  let totalMs, elapsed, mult, label, isWarn, isSuper;
  if (superBonus) {
    totalMs = SUPER_DUR; elapsed = Date.now() - superStart;
    mult = 5; label = 'СУПЕРСТРИК! 🔥'; isWarn = false; isSuper = true;
  } else {
    totalMs = BONUS_TOTAL; elapsed = Date.now() - bonusStart;
    mult = elapsed < BONUS_WARN ? 2 : 1.5;
    label = elapsed < BONUS_WARN ? 'двойные очки' : '×1.5 очки';
    isWarn = elapsed >= BONUS_WARN; isSuper = false;
  }
  const rem  = Math.max(0, totalMs - elapsed);
  const pct  = (rem / totalMs) * 100;
  const secs = (rem / 1000).toFixed(1);
  const dots = Array.from({length: STREAK_TARGET}, (_, i) =>
    `<div class="streak-dot ${i < streak ? 'filled' : ''}"></div>`).join('');
  bonusContent.innerHTML = `<div class="bonus-active">
    <div class="bonus-mult ${isSuper ? 'super' : ''}">${mult}×</div>
    <div class="bonus-label">${label}</div>
    <div class="bonus-bar-wrap"><div class="bonus-bar ${isWarn ? 'warn' : ''}" style="width:${pct}%"></div></div>
    <div class="bonus-time">${secs}s</div>
    ${!isSuper ? `<div class="bonus-label">Стрик до 5×:</div><div class="streak-dots">${dots}</div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
function tickLevelTimer() {
  if (!levelStart) return;
  levelTimerEl.textContent = fmtTime(Math.floor((Date.now() - levelStart) / 1000));
}
function fmtTime(sec) {
  return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
}
function getLevelElapsed() { return levelStart ? Math.floor((Date.now() - levelStart) / 1000) : 0; }

// ═══════════════════════════════════════════════════════
//  SCORE
// ═══════════════════════════════════════════════════════
function updateScoreDisplay() {
  scoreDisplayEl.textContent = levelScore;
  const prev = Object.values(levelScores).reduce((a,b) => a+b, 0);
  totalScoreEl.textContent = prev + levelScore;
}
function renderBreakdowns() {
  let s = '', t = '';
  LEVELS.forEach((lv, i) => {
    const sc = levelScores[i] != null ? levelScores[i] : '—';
    const ti = levelTimes[i]  != null ? fmtTime(levelTimes[i]) : '—';
    s += `<div class="score-row"><span>${lv.label}${lv.optional?' ★':''}</span><span>${sc}</span></div>`;
    t += `<div class="score-row"><span>${lv.label}${lv.optional?' ★':''}</span><span>${ti}</span></div>`;
  });
  scoreBreakEl.innerHTML = s; timeBreakEl.innerHTML = t;
  totalTimeEl.textContent = fmtTime(Object.values(levelTimes).reduce((a,b) => a+b, 0));
}
function totalScore() { return Object.values(levelScores).reduce((a,b) => a+b, 0); }
function totalTime()  { return Object.values(levelTimes).reduce((a,b) => a+b, 0); }

// ═══════════════════════════════════════════════════════
//  SCORE POPUP
// ═══════════════════════════════════════════════════════
function showScorePopup(cardEl, text, isBonus) {
  const rect = cardEl.getBoundingClientRect();
  const pop  = document.createElement('div');
  pop.className = 'score-popup';
  pop.textContent = text;
  pop.style.left     = `${rect.left + rect.width/2}px`;
  pop.style.top      = `${rect.top}px`;
  pop.style.color    = isBonus ? '#ff6b00' : 'var(--rose-deep)';
  pop.style.fontSize = isBonus ? '1.65rem' : '1.3rem';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

// ═══════════════════════════════════════════════════════
//  LEVEL WIN
// ═══════════════════════════════════════════════════════
function handleLevelWin() {
  clearInterval(levelTimerId);
  stopBonus(); stopSuper(); cancelAnimationFrame(bonusRafId);
  const elapsed = getLevelElapsed();
  levelScores[currentLevel] = levelScore;
  levelTimes[currentLevel]  = elapsed;
  if (!completedLevels.includes(currentLevel)) completedLevels.push(currentLevel);
  if (currentLevel === 3) bonusLevelDone = true;
  renderBreakdowns(); updateLevelButtons(); statusEl.textContent = '';
  btnSurrender.style.display = 'none';

  const lv = completedLevels.length;
  const canGetCongrats = lv >= 2;
  const isMainEnd  = currentLevel === MAIN_LEVELS - 1;
  const isBonusEnd = currentLevel === 3;

  if (isBonusEnd) {
    showCongratsModal(totalScore(), totalTime(), lv, true, { isEnd: true, levelScore, elapsed });
  } else if (isMainEnd) {
    showCongratsModal(totalScore(), totalTime(), lv, false, { isEnd: true, levelScore, elapsed, canBonus: true });
  } else if (canGetCongrats) {
    showCongratsModal(totalScore(), totalTime(), lv, false, { isEnd: false, levelScore, elapsed, nextLevel: currentLevel + 1 });
  } else {
    showLevelModal(elapsed, currentLevel + 1);
  }

  spawnConfetti();
}

// ═══════════════════════════════════════════════════════
//  SURRENDER
// ═══════════════════════════════════════════════════════
btnSurrender.addEventListener('click', () => {
  if (!gameStarted) return;
  clearInterval(levelTimerId);
  stopBonus(); stopSuper(); cancelAnimationFrame(bonusRafId);

  const elapsed = getLevelElapsed();
  // Save partial progress
  const partialScore = totalScore() + levelScore;
  const partialTime  = totalTime() + elapsed;
  const lv = completedLevels.length;

  btnSurrender.style.display = 'none';
  showCongratsModal(partialScore, partialTime, lv, bonusLevelDone, {
    isSurrender: true, levelScore, elapsed
  });
});

//  SIMPLE LEVEL WIN MODAL (after levels 1–2 if < 2 done)

    </div>
    <div class="modal-btns">
      <button class="btn-primary" id="mn">Следующий →</button>
      <button class="btn-outline" id="mr">Заново</button>

    btns = `<button class="btn-primary" id="mf">Завершить ✨</button>

  } else {
    btns = `<button class="btn-primary" id="mn">Следующий уровень →</button>
            <button class="btn-outline" id="mf">Завершить</button>
            <button class="btn-outline" id="mrst">Сначала</button>`;
  }

  ov.innerHTML = `<div class="modal">
    <div class="modal-emoji">${cg.emoji}</div>
    <h2>С 8 Марта! 🌹</h2>

function pickCongrats(sc, ti, lv, hasB) {
  return CONGRATS.find(c => c.check(sc, ti, lv, hasB)) || CONGRATS[CONGRATS.length - 1];
}

// ═══════════════════════════════════════════════════════
//  BOUQUET BUILDER — count is strictly ODD
// ═══════════════════════════════════════════════════════
function buildBouquet(flowers) {
  // Ensure odd count — trim last if even
  let f = [...flowers];
  if (f.length % 2 === 0) f = f.slice(0, f.length - 1);

  // Pyramid layout: bottom row largest, top row smallest
  const total = f.length;
  let rows;
  if (total <= 3) {
    rows = [f];
  } else if (total <= 7) {
    // e.g. 5 → [3, 2] or 7 → [4, 3]
    const bot = Math.ceil(total / 2);
    rows = [f.slice(0, bot), f.slice(bot)];
  } else {
    // e.g. 9 → [4, 3, 2] or 11 → [5, 4, 2]
    const bot = Math.ceil(total * 0.45);
    const mid = Math.ceil((total - bot) * 0.6);
    rows = [f.slice(0, bot), f.slice(bot, bot + mid), f.slice(bot + mid)];
  }

  const html = rows.map(r =>
    `<div class="bouquet-row">${r.join(' ')}</div>`
  ).join('');
  return `<div class="bouquet-display">${html}</div>`;
}

function makeOverlay() {
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  return el;
}

function spawnConfetti() {
  const colors = ['#f48fb1','#f06292','#c2185b','#fce4ec','#ffd54f','#a5d6a7'];
  for (let i = 0; i < 65; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      const sz = 7 + Math.random() * 9;
      c.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}vw;
        width:${sz}px;height:${sz}px;
        background:${colors[~~(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'3px'};
        pointer-events:none;z-index:998;
        animation:confettiFall ${1.7+Math.random()*2.1}s linear forwards;opacity:.9`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 32);
  }
}

function fullReset() {
  completedLevels=[]; levelScores={}; levelTimes={}; bonusLevelDone=false;
  currentLevel=0; gameStarted=false;
  updateLevelButtons(); renderBreakdowns();
  totalScoreEl.textContent='0'; totalTimeEl.textContent='0:00';
  btnSurrender.style.display = 'none';
  initGame(0);
}

document.getElementById('new-game-btn').addEventListener('click', fullReset);
