<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Memory — 8 Марта</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-100: #fce4ec;
      --pink-200: #f8bbd0;
      --pink-300: #f48fb1;
      --rose:     #f06292;
      --rose-deep:#c2185b;
      --cream:    #fff9f5;
      --text:     #3a1a2e;
      --muted:    #b07090;
      --shadow:   0 8px 32px rgba(180,60,110,0.13);
      --radius:   18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, #fce4ec88 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 80%, #f8bbd088 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 50% 50%, #fff0f588 0%, transparent 80%);
      pointer-events: none; z-index: 0;
    }
    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 220px;
      grid-template-rows: auto 1fr;
      grid-template-areas: "header header" "main sidebar";
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    header {
      grid-area: header;
      text-align: center;
      padding-bottom: 20px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: var(--rose-deep);
      letter-spacing: -0.5px;
    }
    header p { color: var(--muted); font-size: 0.95rem; margin-top: 4px; font-weight: 300; }
    main {
      grid-area: main;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding-right: 20px;
    }
    .levels {
      display: flex; gap: 8px;
      background: white; padding: 8px 12px;
      border-radius: 50px; box-shadow: var(--shadow);
      justify-content: center; flex-wrap: wrap;
      width: 100%; max-width: 580px;
    }
    .level-btn {
      padding: 7px 16px; border-radius: 30px;
      border: 2px solid var(--pink-200);
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
      position: relative; white-space: nowrap;
    }
    .level-btn.done { background: #f0f0f0; border-color: #ddd; color: #aaa; }
    .level-btn.done::after {
      content: '✓'; position: absolute; top: -6px; right: -6px;
      background: #bbb; color: white; width: 16px; height: 16px;
      border-radius: 50%; font-size: 9px; display: grid; place-items: center;
    }
    .level-btn.active {
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white; border-color: transparent;
      box-shadow: 0 4px 16px rgba(194,24,91,0.35); transform: translateY(-2px);
    }
    .level-btn.optional-badge { border-style: dashed; border-color: var(--pink-300); color: var(--rose); }
    .level-btn.optional-badge::before { content: '★'; margin-right: 4px; font-size: 0.75rem; }
    .level-btn:not(.done):not(.active):not([disabled]):hover { border-color: var(--rose); color: var(--rose-deep); }
    .level-btn[disabled] { opacity: 0.38; cursor: default; pointer-events: none; }

    .stats-bar { display: flex; gap: 14px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .stat {
      background: white; border-radius: 12px;
      padding: 7px 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 7px;
      font-size: 0.9rem; font-weight: 500;
    }
    .stat-val { font-weight: 700; color: var(--rose-deep); font-size: 1rem; }
    #status { font-size: 0.95rem; color: var(--muted); text-align: center; min-height: 1.4em; }

    #game-wrap { width: 100%; max-width: 520px; }
    #game { display: grid; width: 100%; }

    .card { aspect-ratio: 1; cursor: pointer; perspective: 800px; }
    .card-inner {
      width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.23,1,0.32,1); border-radius: var(--radius);
    }
    .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
    .card.matched .card-inner {
      animation: matchPop 0.35s ease forwards, fadeOut 0.5s ease 0.65s forwards;
    }
    @keyframes matchPop {
      0%  { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.14); }
      100%{ transform: rotateY(180deg) scale(1); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: rotateY(180deg) scale(0.82); }
    }
    .card-face {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: var(--radius); display: grid; place-items: center;
    }
    .card-back {
      background: linear-gradient(145deg, var(--pink-200), var(--pink-300));
      border: 2px solid var(--pink-200); box-shadow: var(--shadow);
    }
    .card-back-deco { font-size: clamp(1.1rem, 3.5vw, 2.4rem); opacity: 0.55; user-select: none; }
    .card-front {
      background: white; transform: rotateY(180deg);
      border: 2px solid var(--pink-100); box-shadow: var(--shadow);
      font-size: clamp(1rem, 3.5vw, 2.6rem);
    }
    .card:hover:not(.flipped):not(.matched) .card-back {
      background: linear-gradient(145deg, var(--pink-300), var(--rose));
    }

    .sidebar { grid-area: sidebar; display: flex; flex-direction: column; gap: 12px; padding-top: 4px; }
    .panel { background: white; border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
    .panel h3 {
      font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--rose-deep);
      margin-bottom: 8px; border-bottom: 1px solid var(--pink-100); padding-bottom: 5px;
    }
    .bonus-inactive { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 6px 0; }
    .bonus-active { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bonus-mult { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--rose-deep); line-height: 1; }
    .bonus-mult.super { color: #ff6b00; animation: superGlow 1s ease infinite alternate; }
    @keyframes superGlow {
      from { text-shadow: 0 0 10px rgba(255,107,0,0.3); }
      to   { text-shadow: 0 0 30px rgba(255,107,0,0.7); }
    }
    .bonus-label { font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    .bonus-bar-wrap { width: 100%; height: 7px; background: var(--pink-100); border-radius: 4px; overflow: hidden; }
    .bonus-bar { height: 100%; background: linear-gradient(90deg, var(--rose), var(--rose-deep)); border-radius: 4px; transition: width 0.1s linear; }
    .bonus-bar.warning { background: linear-gradient(90deg, #ff9800, #ff5722); }
    .bonus-time { font-size: 0.78rem; font-weight: 600; color: var(--rose-deep); }
    .streak-dots { display: flex; gap: 3px; justify-content: center; }
    .streak-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink-100); border: 2px solid var(--pink-200); transition: all 0.3s; }
    .streak-dot.filled { background: var(--rose); border-color: var(--rose-deep); box-shadow: 0 0 5px rgba(240,98,146,0.6); }

    .score-total { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--rose-deep); text-align: center; font-weight: 700; }
    .score-sub { font-size: 0.72rem; color: var(--muted); text-align: center; margin-top: 1px; }
    .score-breakdown { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
    .score-row { display: flex; justify-content: space-between; font-size: 0.76rem; color: var(--muted); }
    .score-row span:last-child { font-weight: 600; color: var(--text); }

    .new-game-btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, var(--rose), var(--rose-deep));
      color: white; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 16px rgba(194,24,91,0.3); transition: all 0.25s;
    }
    .new-game-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(194,24,91,0.45); }

    .score-popup {
      position: fixed; font-family: 'Playfair Display', serif; font-weight: 700;
      pointer-events: none; z-index: 100;
      animation: floatUp 1s ease forwards; white-space: nowrap;
    }
    @keyframes floatUp {
      0%  { opacity: 1; transform: translateY(0) scale(1); }
      80% { opacity: 1; transform: translateY(-50px) scale(1.1); }
      100%{ opacity: 0; transform: translateY(-70px) scale(0.9); }
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(60,10,40,0.55);
      backdrop-filter: blur(10px);
      z-index: 200; display: grid; place-items: center;
      animation: fadeInBg 0.4s ease; padding: 20px;
    }
    @keyframes fadeInBg { from { opacity: 0; } }
    .modal {
      background: var(--cream); border-radius: 28px;
      padding: 36px 32px; text-align: center;
      max-width: 500px; width: 100%;
      box-shadow: 0 30px 80px rgba(100,10,60,0.35);
      animation: modalPop 0.5s cubic-bezier(0.23,1,0.32,1);
      position: relative; overflow: hidden;
      max-height: 90vh; overflow-y: auto;
    }
    .modal::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #fce4ec88, transparent 60%);
      pointer-events: none;
    }
    @keyframes modalPop { from { transform: scale(0.7) translateY(30px); opacity: 0; } }
    .modal-emoji { font-size: 3rem; margin-bottom: 6px; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: var(--rose-deep); line-height: 1.15; margin-bottom: 4px; }
    .modal-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; line-height: 1.5; }
    .congrats-text {
      background: linear-gradient(135deg, #fce4ec, #fff9f5);
      border-radius: 14px; padding: 16px 18px;
      margin-bottom: 18px; border: 1px solid var(--pink-200);
      font-size: 0.97rem; line-height: 1.7; color: var(--text);
      font-style: italic; text-align: left; position: relative; z-index: 1;
    }
    .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 20px; position: relative; z-index: 1; }
    .modal-stat { background: white; border-radius: 12px; padding: 11px; box-shadow: 0 4px 12px rgba(180,60,110,0.1); }
    .modal-stat-val { font-family: 'Playfair Display', serif; font-size: 1.55rem; color: var(--rose-deep); font-weight: 700; }
    .modal-stat-lbl { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
    .final-score { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: var(--rose-deep); font-weight: 700; margin: 6px 0 3px; position: relative; z-index: 1; }
    .score-rank { display: inline-block; padding: 4px 14px; background: var(--pink-100); border-radius: 20px; color: var(--rose-deep); font-size: 0.86rem; font-weight: 600; margin-bottom: 14px; position: relative; z-index: 1; }
    .modal-btns { position: relative; z-index: 1; }
    .modal-next-btn, .modal-restart-btn, .modal-all-btn, .modal-optional-btn {
      padding: 11px 22px; border-radius: 30px;
      font-family: 'DM Sans', sans-serif; font-size: 0.93rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s; margin: 4px;
    }
    .modal-next-btn { background: linear-gradient(135deg, var(--rose), var(--rose-deep)); color: white; border: none; box-shadow: 0 4px 16px rgba(194,24,91,0.35); }
    .modal-next-btn:hover { transform: translateY(-2px); }
    .modal-optional-btn { border: 2px dashed var(--rose); background: transparent; color: var(--rose-deep); }
    .modal-optional-btn:hover { background: var(--pink-100); }
    .modal-restart-btn { background: white; color: var(--rose-deep); border: 2px solid var(--pink-200); }
    .modal-restart-btn:hover { border-color: var(--rose); }
    .modal-all-btn { background: white; color: var(--rose-deep); border: 2px solid var(--pink-300); font-size: 0.86rem; padding: 9px 18px; }
    .modal-all-btn:hover { background: var(--pink-100); }

    /* ALL CONGRATS */
    .all-congrats-modal { max-width: 560px; }
    .congrats-list { display: flex; flex-direction: column; gap: 11px; margin: 14px 0; text-align: left; position: relative; z-index: 1; }
    .congrats-item { border-radius: 13px; padding: 13px 15px; border: 1px solid var(--pink-200); position: relative; }
    .congrats-item.unlocked { background: linear-gradient(135deg, #fce4ec44, white); }
    .congrats-item.locked { background: #f9f9f9; opacity: 0.6; }
    .congrats-item-title { font-family: 'Playfair Display', serif; font-size: 0.98rem; color: var(--rose-deep); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .congrats-item-req { font-size: 0.74rem; color: var(--muted); margin-bottom: 6px; }
    .congrats-item-text { font-size: 0.86rem; line-height: 1.55; color: var(--text); font-style: italic; }
    .unlock-badge { position: absolute; top: 9px; right: 11px; background: var(--rose); color: white; font-size: 0.67rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 700px) {
      .app { grid-template-columns: 1fr; grid-template-areas: "header" "main" "sidebar"; padding: 14px; }
      main { padding-right: 0; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .sidebar .panel { flex: 1; min-width: 140px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🌸 Цветочный Сад Тайн</h1>
    <p>Игра памяти · 8 Марта</p>
  </header>

  <main>
    <div class="levels" id="levels">
      <button class="level-btn active" data-level="0">2 × 2</button>
      <button class="level-btn" data-level="1">4 × 4</button>
      <button class="level-btn" data-level="2">6 × 6</button>
      <button class="level-btn optional-badge" data-level="3" id="bonus-level-btn" disabled>8 × 8</button>
    </div>
    <div class="stats-bar">
      <div class="stat">⏱️ <span class="stat-val" id="level-timer">00:00</span></div>
      <div class="stat">💎 <span class="stat-val" id="score-display">0</span></div>
      <div class="stat">🔄 <span class="stat-val" id="moves-display">0</span></div>
    </div>
    <div id="status">Выбери уровень и начинай 🌷</div>
    <div id="game-wrap"><div id="game"></div></div>
  </main>

  <aside class="sidebar">
    <div class="panel">
      <h3>⚡ Бонус</h3>
      <div id="bonus-content"><div class="bonus-inactive">Собери пару 🌸</div></div>
    </div>
    <div class="panel">
      <h3>🏆 Счёт</h3>
      <div class="score-total" id="total-score">0</div>
      <div class="score-sub">суммарно</div>
      <div class="score-breakdown" id="score-breakdown"></div>
    </div>
    <div class="panel">
      <h3>⌛ Время</h3>
      <div class="score-total" id="total-time">0:00</div>
      <div class="score-sub">суммарно</div>
      <div class="score-breakdown" id="time-breakdown"></div>
    </div>
    <button class="new-game-btn" id="new-game-btn">Начать заново</button>
  </aside>
</div>

<script>
const LEVELS = [
  { grid: 2, label: '2 × 2' },
  { grid: 4, label: '4 × 4' },
  { grid: 6, label: '6 × 6' },
  { grid: 8, label: '8 × 8', optional: true },
];
const MAIN_LEVELS   = 3;
const BASE_SCORE    = 10;
const BONUS_TOTAL   = 6000;
const BONUS_WARN    = 3000;
const STREAK_TARGET = 5;
const SUPER_DUR     = 10000;

const SYMBOLS = [
  '🌸','🌺','💐','🎁','👗','💄','👑','💖','🦋','💝',
  '🌼','⭐','🌷','💎','🎀','🌹','🫖','👠','💅','👜',
  '💍','🌻','🍓','🍒','🪻','🪷','🧁','🎶','🦚','🌙',
  '🐝','🫐',
];

// ── CONGRATULATIONS CATALOGUE ──────────────────
// Priority order: most specific first. First matching wins.
const CONGRATS = [
  {
    id: 'perfect',
    title: 'Абсолютное совершенство',
    emoji: '👑',
    req: 'Бонусный уровень 8×8 + 600+ очков + быстрее 8 минут',
    check: (s, t, b) => b && s >= 600 && t < 480,
    text: 'Невозможное стало возможным. Все четыре уровня, включая самый сложный — покорены с блеском и рекордным счётом. Ты совершенна во всём, что делаешь. С праздником весны, настоящая легенда этого цветочного сада! 🌹'
  },
  {
    id: 'bonus_fast',
    title: 'Стремительная чемпионка',
    emoji: '🔥',
    req: 'Бонусный уровень 8×8 + быстрее 6 минут',
    check: (s, t, b) => b && t < 360,
    text: 'Ты взяла штурмом даже самый сложный уровень — и сделала это молниеносно! Такая скорость и сосредоточенность достойны восхищения. С 8 Марта, стремительная и непобедимая! ⚡'
  },
  {
    id: 'bonus_done',
    title: 'Бесстрашная первопроходица',
    emoji: '🔥',
    req: 'Пройти бонусный уровень 8×8',
    check: (s, t, b) => b,
    text: 'Ты не остановилась на достигнутом и приняла вызов! 32 пары — и всё покорено. Твоя настойчивость и смелость вдохновляют. С 8 Марта, бесстрашная первопроходица!'
  },
  {
    id: 'speed_queen',
    title: 'Королева скорости',
    emoji: '⚡',
    req: 'Пройти 3 основных уровня быстрее 3 минут',
    check: (s, t, b) => !b && t < 180,
    text: 'Ты стремительна, как весенний ветер! Твоя скорость и острота ума восхищают. С праздником, королева скорости — пусть этот год будет таким же ярким и стремительным, как ты!'
  },
  {
    id: 'score_master',
    title: 'Мастер бонусов',
    emoji: '💎',
    req: 'Набрать 400+ очков за основные уровни',
    check: (s, t, b) => !b && s >= 400,
    text: 'Бонусы, стрики, множители — ты освоила все секреты сада! Твой блестящий ум и внимательность достойны настоящего восхищения. С 8 Марта — ты просто бриллиант!'
  },
  {
    id: 'speed_good',
    title: 'Изящная и быстрая',
    emoji: '🌷',
    req: 'Пройти 3 основных уровня за 3–6 минут',
    check: (s, t, b) => !b && t >= 180 && t < 360,
    text: 'Легко и изящно — ты прошла игру с грацией весеннего цветка. С 8 Марта! Пусть всё в жизни даётся тебе так же легко и красиво.'
  },
  {
    id: 'decent_score',
    title: 'Хороший результат',
    emoji: '🌼',
    req: 'Набрать 200–399 очков за основные уровни',
    check: (s, t, b) => !b && s >= 200 && s < 400,
    text: 'Отличная игра! Ты нашла баланс между скоростью и точностью. С праздником — пусть жизнь дарит тебе только хорошие совпадения и приятные бонусы!'
  },
  {
    id: 'careful',
    title: 'Вдумчивая душа',
    emoji: '🌸',
    req: 'Пройти 3 основных уровня',
    check: (s, t, b) => !b,
    text: 'Ты не спешишь — ты замечаешь детали, которые другие упускают. Именно такие люди делают мир глубже и красивее. С праздником весны, вдумчивая и прекрасная!'
  },
];

// ── STATE ──────────────────────────────────────
let currentLevel    = 0;
let completedLevels = [];
let levelScores     = {};
let levelTimes      = {};
let bonusLevelDone  = false;

let cards = [], flipped = [], matched = 0, totalPairs = 0;
let moves = 0, levelScore = 0;
let levelStart = null, levelTimerId = null;
let bonusActive = false, bonusStart = null, bonusTimer = null;
let superBonus = false, superStart = null, superTimer = null;
let streak = 0, bonusRafId = null;

// ── DOM ────────────────────────────────────────
const gameEl         = document.getElementById('game');
const statusEl       = document.getElementById('status');
const levelTimerEl   = document.getElementById('level-timer');
const scoreDisplayEl = document.getElementById('score-display');
const movesDisplayEl = document.getElementById('moves-display');
const bonusContent   = document.getElementById('bonus-content');
const totalScoreEl   = document.getElementById('total-score');
const totalTimeEl    = document.getElementById('total-time');
const scoreBreakEl   = document.getElementById('score-breakdown');
const timeBreakEl    = document.getElementById('time-breakdown');

// ── LEVEL BUTTONS ──────────────────────────────
document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    currentLevel = parseInt(btn.dataset.level);
    updateLevelButtons();
    initGame(currentLevel);
  });
});

function updateLevelButtons() {
  const mainDone = completedLevels.filter(i => i < MAIN_LEVELS).length === MAIN_LEVELS;
  document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
    const idx = parseInt(btn.dataset.level);
    const isOpt = LEVELS[idx].optional;
    btn.className = 'level-btn' + (isOpt ? ' optional-badge' : '');
    if (completedLevels.includes(idx)) btn.classList.add('done');
    if (idx === currentLevel)          btn.classList.add('active');
    if (isOpt) btn.disabled = !mainDone;
  });
}

// ── INIT GAME ──────────────────────────────────
function initGame(idx) {
  const { grid } = LEVELS[idx];
  totalPairs = (grid * grid) / 2;
  const syms = SYMBOLS.slice(0, totalPairs);
  let deck = [...syms, ...syms];
  deck.sort(() => Math.random() - 0.5);

  cards = []; flipped = []; matched = 0; moves = 0; levelScore = 0; streak = 0;
  levelStart = null;
  clearInterval(levelTimerId); levelTimerId = null;
  stopBonus(); stopSuper();

  gameEl.innerHTML = '';
  gameEl.style.gridTemplateColumns = `repeat(${grid}, 1fr)`;
  gameEl.style.gap = grid <= 2 ? '14px' : grid <= 4 ? '11px' : grid <= 6 ? '8px' : '5px';

  deck.forEach(sym => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="card-inner">
      <div class="card-face card-back"><span class="card-back-deco">🌸</span></div>
      <div class="card-face card-front">${sym}</div>
    </div>`;
    el.dataset.symbol = sym;
    el.addEventListener('click', () => handleClick(el));
    gameEl.appendChild(el);
    cards.push({ el, symbol: sym, flipped: false, matched: false });
  });

  updateScoreDisplay(); movesDisplayEl.textContent = 0; levelTimerEl.textContent = '00:00';
  statusEl.textContent = `Найди ${totalPairs} пар! 🌷`;
  renderBonusPanel(); renderBreakdowns(); updateLevelButtons();
}

// ── CARD CLICK ─────────────────────────────────
function handleClick(cardEl) {
  if (flipped.length >= 2) return;
  const card = cards.find(c => c.el === cardEl);
  if (!card || card.flipped || card.matched) return;
  if (!levelStart) { levelStart = Date.now(); levelTimerId = setInterval(tickLevelTimer, 1000); }
  card.flipped = true; cardEl.classList.add('flipped'); flipped.push(card);
  if (flipped.length === 2) { moves++; movesDisplayEl.textContent = moves; setTimeout(checkMatch, 650); }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.symbol === b.symbol) {
    a.matched = b.matched = true; matched++; streak++;
    const mult = getCurrentMult();
    const earned = Math.round(BASE_SCORE * mult);
    levelScore += earned;
    showScorePopup(a.el, `+${earned}`, mult > 1);
    a.el.classList.add('matched'); b.el.classList.add('matched');
    if (!superBonus && bonusActive && streak >= STREAK_TARGET && Date.now() - bonusStart < BONUS_WARN) activateSuperBonus();
    startBonus(); updateScoreDisplay();
    if (matched === totalPairs) setTimeout(handleLevelWin, 950);
  } else {
    streak = 0;
    a.flipped = b.flipped = false;
    a.el.classList.remove('flipped'); b.el.classList.remove('flipped');
  }
  flipped = [];
}

// ── BONUS ──────────────────────────────────────
function getCurrentMult() {
  if (superBonus) return 5;
  if (!bonusActive) return 1;
  return Date.now() - bonusStart < BONUS_WARN ? 2 : 1.5;
}
function startBonus() {
  stopBonus(); if (superBonus) return;
  bonusActive = true; bonusStart = Date.now();
  bonusTimer = setTimeout(() => { bonusActive = false; streak = 0; renderBonusPanel(); }, BONUS_TOTAL);
  animateBonus();
}
function stopBonus() { bonusActive = false; clearTimeout(bonusTimer); cancelAnimationFrame(bonusRafId); }
function activateSuperBonus() {
  stopBonus(); superBonus = true; superStart = Date.now(); streak = 0;
  superTimer = setTimeout(() => { superBonus = false; streak = 0; renderBonusPanel(); }, SUPER_DUR);
  animateBonus();
}
function stopSuper() { superBonus = false; clearTimeout(superTimer); }
function animateBonus() {
  cancelAnimationFrame(bonusRafId);
  const f = () => { renderBonusPanel(); if (bonusActive || superBonus) bonusRafId = requestAnimationFrame(f); };
  bonusRafId = requestAnimationFrame(f);
}
function renderBonusPanel() {
  if (!bonusActive && !superBonus) { bonusContent.innerHTML = `<div class="bonus-inactive">Собери пару 🌸</div>`; return; }
  let totalMs, elapsed, mult, label, isWarning, isSuper;
  if (superBonus) {
    totalMs = SUPER_DUR; elapsed = Date.now() - superStart;
    mult = 5; label = 'СУПЕРСТРИК! 🔥'; isWarning = false; isSuper = true;
  } else {
    totalMs = BONUS_TOTAL; elapsed = Date.now() - bonusStart;
    mult = elapsed < BONUS_WARN ? 2 : 1.5;
    label = elapsed < BONUS_WARN ? 'двойные очки' : '×1.5 очки';
    isWarning = elapsed >= BONUS_WARN; isSuper = false;
  }
  const remaining = Math.max(0, totalMs - elapsed);
  const pct = (remaining / totalMs) * 100;
  const secs = (remaining / 1000).toFixed(1);
  const dots = Array.from({length: STREAK_TARGET}, (_, i) =>
    `<div class="streak-dot ${i < streak ? 'filled' : ''}"></div>`).join('');
  bonusContent.innerHTML = `<div class="bonus-active">
    <div class="bonus-mult ${isSuper ? 'super' : ''}">${mult}×</div>
    <div class="bonus-label">${label}</div>
    <div class="bonus-bar-wrap"><div class="bonus-bar ${isWarning ? 'warning' : ''}" style="width:${pct}%"></div></div>
    <div class="bonus-time">${secs}s</div>
    ${!isSuper ? `<div class="bonus-label">Стрик до 5×:</div><div class="streak-dots">${dots}</div>` : ''}
  </div>`;
}

// ── TIMER ──────────────────────────────────────
function tickLevelTimer() {
  if (!levelStart) return;
  levelTimerEl.textContent = fmtTime(Math.floor((Date.now() - levelStart) / 1000));
}
function fmtTime(sec) {
  return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
}
function getLevelElapsed() { return levelStart ? Math.floor((Date.now() - levelStart) / 1000) : 0; }

// ── SCORE DISPLAY ──────────────────────────────
function updateScoreDisplay() {
  scoreDisplayEl.textContent = levelScore;
  const prev = Object.values(levelScores).reduce((a,b) => a+b, 0);
  totalScoreEl.textContent = prev + levelScore;
}
function renderBreakdowns() {
  let s = '', t = '';
  LEVELS.forEach((lv, i) => {
    const sc = levelScores[i] != null ? levelScores[i] : '—';
    const ti = levelTimes[i]  != null ? fmtTime(levelTimes[i]) : '—';
    s += `<div class="score-row"><span>${lv.label}${lv.optional?' ★':''}</span><span>${sc}</span></div>`;
    t += `<div class="score-row"><span>${lv.label}${lv.optional?' ★':''}</span><span>${ti}</span></div>`;
  });
  scoreBreakEl.innerHTML = s; timeBreakEl.innerHTML = t;
  totalTimeEl.textContent = fmtTime(Object.values(levelTimes).reduce((a,b) => a+b, 0));
}

// ── SCORE POPUP ────────────────────────────────
function showScorePopup(cardEl, text, isBonus) {
  const rect = cardEl.getBoundingClientRect();
  const pop  = document.createElement('div');
  pop.className = 'score-popup';
  pop.textContent = text;
  pop.style.left  = `${rect.left + rect.width/2}px`;
  pop.style.top   = `${rect.top}px`;
  pop.style.color = isBonus ? '#ff6b00' : 'var(--rose-deep)';
  pop.style.fontSize = isBonus ? '1.7rem' : '1.35rem';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

// ── LEVEL WIN ──────────────────────────────────
function handleLevelWin() {
  clearInterval(levelTimerId);
  stopBonus(); stopSuper(); cancelAnimationFrame(bonusRafId);
  const elapsed = getLevelElapsed();
  levelScores[currentLevel] = levelScore;
  levelTimes[currentLevel]  = elapsed;
  if (!completedLevels.includes(currentLevel)) completedLevels.push(currentLevel);
  if (currentLevel === 3) bonusLevelDone = true;
  renderBreakdowns(); updateLevelButtons(); statusEl.textContent = '';

  const mainDone   = completedLevels.filter(i => i < MAIN_LEVELS).length === MAIN_LEVELS;
  const isMainEnd  = mainDone && currentLevel === MAIN_LEVELS - 1;
  const isBonus    = currentLevel === 3;

  if (isBonus)     showBonusWinModal(elapsed);
  else if (isMainEnd) showMainWinModal(elapsed);
  else             showLevelModal(elapsed);

  spawnConfetti();
}

// Helpers
function mainScore() { let s=0; for(let i=0;i<MAIN_LEVELS;i++) s+=levelScores[i]||0; return s; }
function mainTime()  { let t=0; for(let i=0;i<MAIN_LEVELS;i++) t+=levelTimes[i]||0;  return t; }
function totalScore(){ return Object.values(levelScores).reduce((a,b)=>a+b,0); }
function totalTime() { return Object.values(levelTimes).reduce((a,b)=>a+b,0); }
function pickCongrats(sc, ti, hasB) {
  return CONGRATS.find(c => c.check(sc, ti, hasB)) || CONGRATS[CONGRATS.length-1];
}
function makeOverlay() {
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  return el;
}

// ── MODALS ─────────────────────────────────────
function showLevelModal(elapsed) {
  const nextIdx = currentLevel + 1;
  const ov = makeOverlay();
  ov.innerHTML = `<div class="modal">
    <div class="modal-emoji">🌸</div>
    <h2>Уровень пройден!</h2>
    <p class="modal-sub">Отлично! Продолжай в том же духе 💐</p>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${levelScore}</div><div class="modal-stat-lbl">очков</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${fmtTime(elapsed)}</div><div class="modal-stat-lbl">время</div></div>
    </div>
    <div class="modal-btns">
      <button class="modal-next-btn" id="mn">Следующий →</button>
      <button class="modal-restart-btn" id="mr">Заново</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mn').onclick = () => { ov.remove(); currentLevel = nextIdx; updateLevelButtons(); initGame(nextIdx); };
  ov.querySelector('#mr').onclick = () => { ov.remove(); initGame(currentLevel); };
}

function showMainWinModal(elapsed) {
  const sc = mainScore(), ti = mainTime();
  const cg = pickCongrats(sc, ti, false);
  const ov = makeOverlay();
  ov.innerHTML = `<div class="modal">
    <div class="modal-emoji">${cg.emoji}</div>
    <h2>С 8 Марта! 🌹</h2>
    <p class="modal-sub">Три уровня позади — ты справилась!</p>
    <div class="final-score">${sc}</div>
    <div class="score-rank">${cg.title}</div>
    <div class="congrats-text">${cg.text}</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${fmtTime(ti)}</div><div class="modal-stat-lbl">общее время</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${sc}</div><div class="modal-stat-lbl">суммарно очков</div></div>
    </div>
    <div class="modal-btns">
      <button class="modal-optional-btn" id="mb">★ Принять вызов 8×8</button>
      <button class="modal-next-btn" id="mf">Завершить ✨</button>
    </div>
    <div style="margin-top:10px" class="modal-btns">
      <button class="modal-all-btn" id="ma">Показать все поздравления</button>
      <button class="modal-restart-btn" id="mrst">Сначала</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mb').onclick   = () => { ov.remove(); currentLevel=3; updateLevelButtons(); initGame(3); };
  ov.querySelector('#mf').onclick   = () => { ov.remove(); };
  ov.querySelector('#ma').onclick   = () => { ov.remove(); showAllModal(sc, ti, false); };
  ov.querySelector('#mrst').onclick = () => { ov.remove(); fullReset(); };
}

function showBonusWinModal(elapsed) {
  const sc = totalScore(), ti = totalTime();
  const cg = pickCongrats(sc, ti, true);
  const ov = makeOverlay();
  ov.innerHTML = `<div class="modal">
    <div class="modal-emoji">${cg.emoji}</div>
    <h2>С 8 Марта! 🌹🔥</h2>
    <p class="modal-sub">Все четыре уровня покорены — ты легенда!</p>
    <div class="final-score">${sc}</div>
    <div class="score-rank">${cg.title}</div>
    <div class="congrats-text">${cg.text}</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${fmtTime(ti)}</div><div class="modal-stat-lbl">общее время</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${sc}</div><div class="modal-stat-lbl">суммарно очков</div></div>
    </div>
    <div class="modal-btns">
      <button class="modal-next-btn" id="mf">Завершить ✨</button>
    </div>
    <div style="margin-top:10px" class="modal-btns">
      <button class="modal-all-btn" id="ma">Показать все поздравления</button>
      <button class="modal-restart-btn" id="mrst">Сначала</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mf').onclick   = () => { ov.remove(); };
  ov.querySelector('#ma').onclick   = () => { ov.remove(); showAllModal(sc, ti, true); };
  ov.querySelector('#mrst').onclick = () => { ov.remove(); fullReset(); };
}

function showAllModal(sc, ti, hasB) {
  const ov = makeOverlay();
  const items = CONGRATS.map(def => {
    const got = def.check(sc, ti, hasB);
    return `<div class="congrats-item ${got ? 'unlocked' : 'locked'}">
      ${got ? '<div class="unlock-badge">Получено ✓</div>' : ''}
      <div class="congrats-item-title">${def.emoji} ${def.title} ${!got ? '🔒' : ''}</div>
      <div class="congrats-item-req">Условие: ${def.req}</div>
      <div class="congrats-item-text">${got ? def.text : 'Пока не получено...'}</div>
    </div>`;
  }).join('');
  ov.innerHTML = `<div class="modal all-congrats-modal">
    <div class="modal-emoji">🌸</div>
    <h2>Все поздравления</h2>
    <p class="modal-sub">Что ты получила — и что ещё можно открыть!</p>
    <div class="congrats-list">${items}</div>
    <div class="modal-btns">
      <button class="modal-next-btn" id="mc">Закрыть</button>
      <button class="modal-restart-btn" id="mr">Играть сначала</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mc').onclick = () => { ov.remove(); };
  ov.querySelector('#mr').onclick = () => { ov.remove(); fullReset(); };
}

// ── CONFETTI ───────────────────────────────────
function spawnConfetti() {
  const colors = ['#f48fb1','#f06292','#c2185b','#fce4ec','#ffd54f','#81d4fa'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      const sz = 8 + Math.random()*9;
      c.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}vw;
        width:${sz}px;height:${sz}px;
        background:${colors[~~(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'3px'};
        pointer-events:none;z-index:998;
        animation:confettiFall ${1.8+Math.random()*2}s linear forwards;opacity:.9`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4200);
    }, i * 32);
  }
}

// ── RESET ──────────────────────────────────────
function fullReset() {
  completedLevels=[]; levelScores={}; levelTimes={}; bonusLevelDone=false; currentLevel=0;
  updateLevelButtons(); renderBreakdowns();
  totalScoreEl.textContent='0'; totalTimeEl.textContent='0:00';
  initGame(0);
}

document.getElementById('new-game-btn').addEventListener('click', fullReset);

initGame(0);
</script>
</body>
